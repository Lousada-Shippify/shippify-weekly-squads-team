name: Update data
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build data.json from Jira
        run: node build.mjs
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_SITE: shippify.atlassian.net
      - name: Commit & push if changed
        run: |
          git config user.name "weekly-hub-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: refresh data.json [skip ci]"
          git push
