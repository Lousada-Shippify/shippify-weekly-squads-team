<script>
const CLOUD = 'shippify.atlassian.net';
const T_SEARCH = 'mcp__3fb2a7a0-782a-45ec-913e-b171f0c68891__searchJiraIssuesUsingJql';
const T_DESC   = 'mcp__3fb2a7a0-782a-45ec-913e-b171f0c68891__getConfluencePageDescendants';
const T_CREATE = 'mcp__3fb2a7a0-782a-45ec-913e-b171f0c68891__createConfluencePage';
const SP_FIELD = 'customfield_10028';
const SPRINT_FIELD = 'customfield_10020';
const SPACE_ID = '2523141';
const OKRS_PAGE = '11599873';        // 03 · OKRs & Metrics
const WPM_FOLDER = '12091397';       // Weekly Product Meeting
const SQUADS = [
  // AE pontua SUBTAREFAS (o board/painel de sprint da squad conta esses SP) → includeSubtasks.
  // OE e EE não pontuam subtasks → excluídas (regra validada contra os badges do backlog).

  {code:'OE', name:'Operation Experience', project:'OE', board:474},
  {code:'EE', name:'Ecosystem Experience', project:'EE', board:475},
];
// BASELINES OFICIAIS de sprints FECHADAS — badges do Jira lidos na época (reports validados:
// anexo OE + Sprint Plans 5570562 e 22708225). Sprints fechadas não mudam mais; os campos atuais
// do Jira NÃO preservam a foto da época (commitment, SP re-estimados, clones herdam sprint field),
// então a reconstrução via JQL divergiria. Sem baseline → reconstrução, marcada com "≈".
// Sugestões iniciais de Sprint Agreements (Sprint 4) — mapeadas dos cards da sprint, da Retrospective
// Sprint 3 e do histórico de gargalos. Semeadas UMA vez nos campos editáveis; o PM ajusta à vontade.
const AGR_SUGGEST={
  AE:{sprint:'Sprint 4',
    constraints:'No public holidays, but we are in the World Cup period — there may be matches / possible breaks.\nDeveloper Patrick on vacation from mid-sprint, returning halfway through Sprint 5 (08/07 ~ 20/07).',
    risks:'Deployment-related risks around the MM Phase 3 delivery and its tight deadline, compounded by interdependencies with other squads.\n13 carryover issues (14.75 SP) still in the post-dev pipeline (13 SP in CODE REVIEW) — closing them early frees the MM Phase 3 path.',
    validations:'Validation with the Amazon team (MM project) on July 8 — MM Phase 3 launched early to ensure "live" testing.\nPickup version (tokens) to Americanas/Abbiamo — deadline July 15; delivering earlier is a success.'},
  OE:{sprint:'Sprint 4',
    constraints:'World Cup period (possible match breaks).\nMM Phase 3 deadline July 8: QA-pipeline carryover (alert visibility / Smart Notification) must be closed before pulling new Control Tower scope (Sprint 3 retro recommendation: dedicated QA focus early in the sprint).\nTech Support bug backlog (OE-190, 5 SP) competes for dev capacity.',
    risks:'40% of the sprint scope (38 SP) is carryover from Sprint 3 sitting in the post-dev pipeline: 10.5 SP PENDING QA (incl. Smart Notification bugs OE-176/177/178) and 5.5 SP REJECTED BY QA (Companies — context menu, needs rework).\nQA throughput was the limiting factor in Sprint 3 — risk of repeating the pattern.\nControl Tower (OE-139/140/141, 26 SP) still not started with discovery (OE-180) in progress — estimate uncertainty on the sprint goal itself.',
    validations:'MM Phase 3 — alert visibility: validate final QA + deploy against the July 8 deadline.\nSmart Notification real-time fixes (OE-176/177/178) pending QA validation.\nControl Tower discovery (OE-180) outcomes to be validated with Operations before build starts.'},
  EE:{sprint:'Sprint 4',
    constraints:'Sprint goal not set in Jira (board 475) — recommend registering it on the sprint.\nRefinement placeholders (EE-147–151) reserve capacity for discovery rather than delivery.\nHigh Tech Support demand (EE-124 currently BLOCKED, EE-126 in progress).',
    risks:'72% of the sprint scope (53.25 SP) is carryover — 28 SP stuck in CODE REVIEW (Gamification EE-24, Smart Notification UX errors EE-18, IdWall sustainability EE-108) and 15 SP in QA.\nSprint 3 pattern (25% SP done, very heavy in-progress tickets) at risk of repeating.\nEE-124 (Tech Support) blocked — external dependency.',
    validations:'IdWall: upload format fix (EE-101) waiting for deploy; service sustainability (EE-108) in review — validate the end-to-end flow.\nGiuliana Flores max-distance block (EE-144, approved by QA) — validate with the client.\nFleet file validation (EE-136) waiting for deploy — validate with Operations.'},
};
const S1P={start:'2026-05-19',end:'2026-06-01'}, S2P={start:'2026-06-02',end:'2026-06-16'}, S3P={start:'2026-06-16',end:'2026-06-30'};
const BASELINES = {
  AE: {
    'Sprint 1': {scope:null,   delivered:44.5, ...S1P},
    'Sprint 2': {scope:148.75, delivered:75.25, ...S2P},
    'Sprint 3': {scope:90.25,  delivered:68.75, issuesDone:52, issuesTotal:66, ...S3P},
  },
  OE: {
    'Sprint 1': {scope:22.5,  delivered:9.25, volume:25, ...S1P},
    'Sprint 2': {scope:53.25, delivered:5.5,  volume:55, ...S2P},
    'Sprint 3': {scope:65.75, delivered:46.5, volume:46, issuesDone:26, issuesTotal:46, ...S3P},
  },
  EE: {
    'Sprint 1': {scope:60,    delivered:28, ...S1P},
    'Sprint 2': {scope:42.25, delivered:31, ...S2P},
    'Sprint 3': {scope:89.25, delivered:22, issuesDone:13, issuesTotal:23, ...S3P},
  },
};
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTHS_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WORKDAYS = 15;
let DATA = null;
let charts = [];

const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtSP = n => (Math.round(n*100)/100).toString();
const pct = (a,b) => b>0 ? Math.round(a/b*100) : 0;
const ddmm = d => String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
const ddmmyyyy = d => ddmm(d)+'/'+d.getFullYear();

function parseResult(r){
  if(r.isError){ throw new Error((r.content&&r.content[0]&&r.content[0].text)||'Erro MCP'); }
  if(r.structuredContent) return r.structuredContent;
  return JSON.parse(r.content[0].text);
}

async function runJql(jql, fields){
  let nodes=[], token=null;
  for(let i=0;i<15;i++){
    const args={cloudId:CLOUD, jql, fields, maxResults:100, searchResultMode:'issues'};
    if(token) args.nextPageToken=token;
    const d = parseResult(await window.cowork.callMcpTool(T_SEARCH,args));
    const iss = d.issues||d;
    nodes = nodes.concat(iss.nodes||[]);
    const pi = iss.pageInfo||{};
    if(pi.hasNextPage && pi.endCursor) token=pi.endCursor; else break;
  }
  return nodes;
}

function workdayIndex(start, today){
  // business days elapsed from sprint start (inclusive) to today
  let d=new Date(start); d.setHours(0,0,0,0);
  const t=new Date(today); t.setHours(0,0,0,0);
  let n=0;
  while(d<=t && n<WORKDAYS){
    const wd=d.getDay();
    if(wd!==0 && wd!==6) n++;
    d.setDate(d.getDate()+1);
  }
  return Math.max(1, n);
}

function processSquad(sq, nodes){
  const recs = []; // registro por issue p/ análise de carryover
  const sprints = new Map(); // id -> sprint aggregate
  const getS = s => {
    if(!sprints.has(s.id)) sprints.set(s.id,{id:s.id,name:s.name,state:s.state,goal:s.goal||'',
      start:s.startDate?new Date(s.startDate):null,end:s.endDate?new Date(s.endDate):null,
      scope:0,count:0,delivered:0,doneCount:0,todoSP:0,inprogSP:0,doneSP:0,todoN:0,inprogN:0,doneN:0,cancSP:0,cancN:0});
    return sprints.get(s.id);
  };
  for(const n of nodes){
    const f=n.fields||{};
    const sp = typeof f[SP_FIELD]==='number' ? f[SP_FIELD] : 0;
    const cat = f.status && f.status.statusCategory ? f.status.statusCategory.key : 'new';
    // CANCEL/CANCELED etc. have status category "done" in Jira but are NOT delivered work:
    // they must leave the scope and never count as completed (root cause of the AE distortion).
    const cancelled = cat==='done' && /cancel|discard|descart/i.test((f.status&&f.status.name)||'');
    const res = f.resolutiondate ? new Date(f.resolutiondate) : null;
    const mySprints = (Array.isArray(f[SPRINT_FIELD])?f[SPRINT_FIELD]:[]).filter(s=>s.boardId===sq.board);
    if(!mySprints.length) continue;
    const sorted = mySprints.slice().sort((a,b)=>new Date(a.startDate||0)-new Date(b.startDate||0));
    recs.push({key:n.key, sp, cat, cancelled, status:(f.status&&f.status.name)||'—', ids:sorted.map(x=>x.id),
      summary:f.summary||'', epic:(f.parent&&f.parent.fields&&f.parent.fields.summary)||null,
      assignee:(f.assignee&&f.assignee.displayName)||null, spNull:f[SP_FIELD]==null});
    const rec=recs[recs.length-1];
    for(const s of sorted){ const agg=getS(s); if(cancelled){agg.cancSP+=sp;agg.cancN++;} else {agg.scope+=sp;agg.count++;} }
    // active-sprint badges (non-subtask issues by status category, cancelled excluded)
    const act = sorted.find(s=>s.state==='active');
    if(act && !cancelled){
      const a=getS(act);
      if(cat==='done'){a.doneSP+=sp;a.doneN++;} else if(cat==='indeterminate'){a.inprogSP+=sp;a.inprogN++;} else {a.todoSP+=sp;a.todoN++;}
    }
    // delivered attribution for history (cancelled never counts as delivered)
    if(cat==='done' && !cancelled){
      let target=null;
      if(res){
        target = sorted.find(s=>{
          const st=s.startDate?new Date(s.startDate):null, en=s.endDate?new Date(s.endDate):null;
          return st&&en&&res>=st&&res<=new Date(en.getTime()+86400000);
        });
        if(!target) target = sorted.filter(s=>s.endDate&&new Date(s.endDate)>=res)[0] || sorted[sorted.length-1];
      } else target = sorted[sorted.length-1];
      const tg=getS(target); tg.delivered+=sp; tg.doneCount++;
      rec.delivClosed = target.state==='closed'; // entrega em sprint já fechada → conta na média por dev
      rec.delivSprintId = target.id; // sprint à qual a entrega foi atribuída (matriz dev × sprint)
    }
  }
  // Sprints "future" (planejadas, não iniciadas) ficam fora do mapa — entram quando ativarem
  const list=[...sprints.values()].filter(s=>s.state!=='future').sort((a,b)=>(a.start||0)-(b.start||0));
  // Sprints fechadas: sobrepõe com o baseline oficial (badges lidos na época) quando existir
  for(const s of list){
    if(s.state!=='closed') continue;
    const b=(BASELINES[sq.code]||{})[sprintLabel(s)];
    if(b){
      s.official=true;
      if(b.scope!=null) s.scope=b.scope; else s.scopeUnknown=true;
      if(b.delivered!=null) s.delivered=b.delivered;
      if(b.volume!=null) s.count=b.volume;
      if(b.issuesDone!=null){ s.doneCount=b.issuesDone; s.issuesTotal=b.issuesTotal; }
    }
  }
  // Sprints fechadas que não existem mais nos campos atuais (ex.: AE Sprint 1) entram só pelo baseline
  const labels=new Set(list.map(sprintLabel));
  for(const [nm,b] of Object.entries(BASELINES[sq.code]||{})){
    if(labels.has(nm)) continue;
    list.push({id:'bl-'+nm, name:nm, state:'closed', official:true, goal:'',
      start:b.start?new Date(b.start+'T12:00:00Z'):null, end:b.end?new Date(b.end+'T12:00:00Z'):null,
      scope:b.scope!=null?b.scope:0, scopeUnknown:b.scope==null,
      count:b.volume||0, delivered:b.delivered||0, doneCount:b.issuesDone||0, issuesTotal:b.issuesTotal||0,
      todoSP:0,inprogSP:0,doneSP:0,todoN:0,inprogN:0,doneN:0,cancSP:0,cancN:0});
  }
  list.sort((a,b)=>(a.start||0)-(b.start||0));
  // Carryover: issue presente na sprint anterior E na seguinte (exclui canceladas)
  for(let i=1;i<list.length;i++){
    const prev=list[i-1], cur=list[i];
    if(String(prev.id).startsWith('bl-')||String(cur.id).startsWith('bl-')){cur.carryNA=true;continue;}
    const carried=recs.filter(r=>!r.cancelled&&r.ids.includes(prev.id)&&r.ids.includes(cur.id));
    cur.carryN=carried.length;
    cur.carrySP=carried.reduce((x,r)=>x+r.sp,0);
    if(cur.state==='active'){
      const by={};
      for(const r of carried){const b=by[r.status]=by[r.status]||{n:0,sp:0};b.n++;b.sp+=r.sp;}
      cur.carryByStatus=by;
    }
  }
  const active=list.find(s=>s.state==='active')||null;
  if(active){
    active.badgeScope=active.todoSP+active.inprogSP+active.doneSP;
    active.remaining=active.todoSP+active.inprogSP;
    active.day=workdayIndex(active.start,new Date());
    // Main deliveries: agrupa cards da sprint ativa por épico (parent) ou tag [XXX] do summary
    const acts=recs.filter(r=>!r.cancelled&&r.ids.includes(active.id));
    const gm={};
    for(const r of acts){
      const tag=(r.summary.match(/^\s*\[([^\]]{2,30})\]/)||[])[1];
      const k=r.epic||tag||'Outros / avulsos';
      const g=gm[k]=gm[k]||{n:0,sp:0,dn:0,dsp:0,inN:0,insp:0,ex:[]};
      g.n++; g.sp+=r.sp;
      if(g.ex.length<2&&r.summary&&!/^\s*\[?refin/i.test(r.summary)) g.ex.push(r.summary);
      if(r.cat==='done'){g.dn++; g.dsp+=r.sp;}
      else if(r.cat==='indeterminate'){g.inN++; g.insp+=r.sp;}
    }
    active.deliveries=Object.entries(gm).sort((a,b)=>b[1].sp-a[1].sp);
    active.doneList=acts.filter(r=>r.cat==='done').map(r=>({key:r.key,summary:r.summary,sp:r.sp}));
  }
  // Desempenho por Dev/QA (responsável): sprint atual + média entregue por sprint FECHADA (viva —
  // recalculada a cada sprint encerrada). Participação = sprints fechadas em que teve issues.
  const devMap={};
  const closedIds=new Set(list.filter(s=>s.state==='closed'&&!String(s.id).startsWith('bl-')).map(s=>s.id));
  for(const r of recs){
    if(r.cancelled) continue;
    const nm=r.assignee||'Sem responsável';
    const d=devMap[nm]=devMap[nm]||{name:nm,n:0,dn:0,sp:0,dsp:0,isp:0,tsp:0,noSP:0,histSP:0,histN:0,part:new Set(),by:{}};
    for(const sid of r.ids){
      if(closedIds.has(sid)) d.part.add(sid);
      const bs=d.by[sid]=d.by[sid]||{aSP:0,aN:0,dSP:0,dN:0};
      bs.aSP+=r.sp; bs.aN++;
    }
    if(r.cat==='done'&&r.delivSprintId!=null){
      const bs=d.by[r.delivSprintId]=d.by[r.delivSprintId]||{aSP:0,aN:0,dSP:0,dN:0};
      bs.dSP+=r.sp; bs.dN++;
    }
    if(r.cat==='done'&&r.delivClosed){ d.histSP+=r.sp; d.histN++; }
    if(active&&r.ids.includes(active.id)){
      d.n++; d.sp+=r.sp; if(r.spNull)d.noSP++;
      if(r.cat==='done'){d.dn++;d.dsp+=r.sp;}
      else if(r.cat==='indeterminate')d.isp+=r.sp;
      else d.tsp+=r.sp;
    }
  }
  const devs=Object.values(devMap)
    .filter(d=>d.n>0||d.histN>0)
    .map(d=>({...d,partN:d.part.size,avgSP:d.part.size?d.histSP/d.part.size:0,avgN:d.part.size?d.histN/d.part.size:0}))
    .sort((a,b)=>{if(a.name==='Sem responsável')return 1;if(b.name==='Sem responsável')return -1;return b.sp-a.sp;});
  // Resumo (Sprint Review) da última sprint FECHADA — formato da Retrospective/Rovo
  let review=null;
  const realClosed=list.filter(s=>s.state==='closed'&&!String(s.id).startsWith('bl-'));
  const lastC=realClosed[realClosed.length-1]||null;
  if(lastC){
    const inS=recs.filter(r=>r.ids.includes(lastC.id));
    const doneIn=inS.filter(r=>!r.cancelled&&r.cat==='done'&&r.delivSprintId===lastC.id);
    const cancIn=inS.filter(r=>r.cancelled);
    const openOut=inS.filter(r=>!r.cancelled&&!(r.cat==='done'&&r.delivSprintId===lastC.id));
    const gm={};
    for(const r of doneIn){const tag=(r.summary.match(/^\s*\[([^\]]{2,30})\]/)||[])[1];const k=r.epic||tag||'Outros';const g=gm[k]=gm[k]||{n:0,sp:0};g.n++;g.sp+=r.sp;}
    const pipe={};
    for(const r of openOut){const p=pipe[r.status]=pipe[r.status]||{n:0,sp:0};p.n++;p.sp+=r.sp;}
    review={s:lastC,
      wins:Object.entries(gm).sort((a,b)=>b[1].sp-a[1].sp).slice(0,4),
      pipe:Object.entries(pipe).sort((a,b)=>b[1].sp-a[1].sp),
      doneN:doneIn.length, doneSP:doneIn.reduce((x,r)=>x+r.sp,0),
      openN:openOut.length, openSP:openOut.reduce((x,r)=>x+r.sp,0),
      cancN:cancIn.length, cancSP:cancIn.reduce((x,r)=>x+r.sp,0)};
  }
  return {squad:sq, sprints:list, active, issueCount:nodes.length, devs, review};
}

async function loadAll(){
  document.getElementById('loadingMsg').textContent='Carregando data.json…';
  const resp=await fetch('data.json?v='+Date.now());
  if(!resp.ok) throw new Error('data.json ainda nao foi gerado. No repositorio: Settings > Secrets and variables > Actions > cadastre JIRA_EMAIL e JIRA_API_TOKEN, depois Actions > "Update data" > Run workflow.');
  const raw=await resp.json();
  window.__GEN__=raw.generatedAt;
  const results={};
  for(const sq of SQUADS){ results[sq.code]=processSquad(sq,(raw.squads&&raw.squads[sq.code])||[]); }
  return results;
}

function statusPill(p, day){
  if(day<=2 && p<10) return '<span class="pill blue">'+p+'% · início</span>';
  const ideal = Math.round(day/WORKDAYS*100);
  if(p>=ideal-5) return '<span class="pill green">'+p+'%</span>';
  if(p>=ideal*0.5) return '<span class="pill yellow">'+p+'%</span>';
  return '<span class="pill red">'+p+'%</span>';
}
function boardUrl(sq){return 'https://shippify.atlassian.net/jira/software/c/projects/'+sq.project+'/boards/'+sq.board+'?isInsightsOpen=true';}
function sprintLabel(s){return s? s.name.replace(/^EE\s+/,''):'—';}

    '<tr><td><strong>Delivered SP</strong></td>'+rowDel+'</tr>'+
    '<tr><td><strong>Taxa SP (%)</strong></td>'+rowRate+'</tr>'+
    '<tr><td><strong>Volume de cards</strong></td>'+rowVol+'</tr>'+
    '<tr><td><strong>Issues Done (%)</strong></td>'+rowIss+'</tr>'+
    '<tr><td><strong>Cancelled SP</strong> <small>(fora do scope)</small></td>'+rowCanc+'</tr>'+
    '<tr><td><strong>Sprint Goal</strong></td>'+rowGoal+'</tr>'+
    '</tbody></table></div>';
  // 🏁 Resumo da sprint encerrada (formato Sprint Review)
  if(d.review){

    html+='<div class="panel"><h2>🏁 Resumo — '+esc(sprintLabel(s))+' (encerrada'+(s.end?' em '+ddmm(s.end):'')+')</h2>'+

      '<tr><th>Visão geral</th><td>Scope <strong>'+(sc!=null?fmtSP(sc):'—')+' SP</strong> · Entregue <strong style="color:var(--verde)">'+fmtSP(del)+' SP</strong> '+(rate!=null?'<span class="pill '+(rate>=70?'green':(rate>=35?'yellow':'red'))+'">'+rate+'%</span>':'')+' · '+r.doneN+' issues concluídas · Meta: <strong>'+meta+'</strong></td></tr>'+
      '<tr><th>✅ Conquistas</th><td>'+(r.wins.length?r.wins.map(([nm,g])=>'<div class="deliv">• <strong>'+esc(nm)+'</strong> — '+fmtSP(g.sp)+' SP · '+g.n+' issues entregues</div>').join(''):'—')+'</td></tr>'+
      '<tr><th>🚧 Não concluído</th><td>'+(r.pipe.length?r.pipe.map(([st,v])=>'<span class="pill '+(/conclu|done/i.test(st)?'green':(/pend|block|reject|wait|qa|review/i.test(st)?'yellow':'blue'))+'" style="margin:2px 4px 2px 0">'+esc(st)+' · '+v.n+' · '+fmtSP(v.sp)+' SP</span>').join(' '):'Nada ficou aberto 🎉')+'<br><small style="color:var(--text-secondary)">'+r.openN+' issues · '+fmtSP(r.openSP)+' SP seguiram adiante</small></td></tr>'+
      '<tr><th>🔄 Escopo</th><td>'+(r.cancN?r.cancN+' issue(s) canceladas ('+fmtSP(r.cancSP)+' SP, fora do scope) · ':'')+'Carryover: '+r.openN+' issues / '+fmtSP(r.openSP)+' SP</td></tr>'+
      (recos.length?'<tr><th>🎯 Recomendações</th><td>'+recos.map(t=>'<div class="deliv">• '+t+'</div>').join('')+'</td></tr>':'')+
      '</tbody></table></div>';
  }
  if(a && avgDelivered>0 && a.badgeScope>avgDelivered*1.3){
    const over=Math.round((a.badgeScope/avgDelivered-1)*100);
    html+='<div class="alert-box"><h4>⚠️ '+esc(sprintLabel(a))+' — risco de overcommit</h4>'+
      '<p>Scope atual <strong>'+fmtSP(a.badgeScope)+' SP</strong> vs média entregue nas '+closed.length+' sprints fechadas: <strong>'+fmtSP(avgDelivered)+' SP</strong> → <strong>~'+over+'% acima</strong> da capacidade histórica.</p></div>';
  }
  // Carryover — herdado da sprint anterior
  html+='<div class="panel"><h2>📦 Carryover — herdado da sprint anterior</h2>'+
    '<p class="panel-sub">Issues (sem subtarefas, sem canceladas) presentes na sprint anterior E na seguinte — exatamente o que o “Complete Sprint” do Jira moveu adiante (o que voltou ao backlog não conta). <strong>≈ SP com estimativas ATUAIS</strong>: em transições entre sprints fechadas, re-estimativas posteriores podem inflar o valor vs. a foto da época (o Jira não preserva o SP nem o status da virada). Para a <strong>sprint ativa</strong>, o detalhamento mostra o status atual de cada issue herdada.</p>'+
    '<table><thead><tr><th>Transição</th><th>Issues herdadas</th><th>SP herdados</th><th>% do scope da sprint</th></tr></thead><tbody>'+
    list.slice(1).map((s,i)=>{
      const prev=list[i];
      const lbl=sprintLabel(prev)+' → '+sprintLabel(s)+(s.state==='active'?' ⬅️':'');
      if(s.carryNA||s.carryN==null) return '<tr><td>'+lbl+'</td><td>—</td><td>—</td><td>—</td></tr>';
      const sc=scopeOf(s);
      const p=sc?pct(s.carrySP,sc):null;
      const mkT=s.state==='closed'?' <small style="color:var(--text-secondary)" title="reconstruído com estimativas atuais — pode diferir da foto da época no Jira">≈</small>':'';
      return '<tr><td>'+lbl+'</td><td>'+s.carryN+'</td><td>'+fmtSP(s.carrySP)+mkT+'</td><td>'+(p!==null?'<span class="pill '+(p>40?'red':(p>20?'yellow':'green'))+'">'+p+'%'+(s.state==='closed'?' ≈':'')+'</span>':'—')+'</td></tr>';
    }).join('')+'</tbody></table>';
  if(a&&a.carryByStatus&&Object.keys(a.carryByStatus).length){
    const entries=Object.entries(a.carryByStatus).sort((x,y)=>y[1].sp-x[1].sp);
    html+='<h3 style="font-size:14px;margin:18px 0 8px">Em qual status o carryover está — '+esc(sprintLabel(a))+' (Day '+a.day+')</h3>'+
      '<table><thead><tr><th>Status</th><th>Issues</th><th>SP</th><th>% dos SP herdados</th></tr></thead><tbody>'+
      entries.map(([st,v])=>'<tr><td><span class="pill '+(/conclu|done/i.test(st)?'green':(/pend|block|reject|wait/i.test(st)?'yellow':'blue'))+'">'+esc(st)+'</span></td><td>'+v.n+'</td><td>'+fmtSP(v.sp)+'</td><td>'+pct(v.sp,a.carrySP)+'%</td></tr>').join('')+
      '<tr class="total-row"><td>Total</td><td>'+a.carryN+'</td><td>'+fmtSP(a.carrySP)+'</td><td>100%</td></tr></tbody></table>';
  }
  html+='</div>';
  // Desempenho por Dev/QA
  if(d.devs&&d.devs.length){
    const totD={n:0,dn:0,sp:0,dsp:0,isp:0,tsp:0,noSP:0,histSP:0,histN:0};
    const rowsD=d.devs.map(v=>{
      Object.keys(totD).forEach(k=>totD[k]+=v[k]||0);
      const p=v.sp>0?pct(v.dsp,v.sp):null;
      return '<tr><td'+(v.name==='Sem responsável'?' style="color:var(--text-disabled);font-style:italic"':' style="font-weight:600"')+'>'+esc(v.name)+'</td>'+
        '<td>'+v.n+'</td><td>'+v.dn+'</td><td>'+fmtSP(v.sp)+'</td><td style="color:var(--verde);font-weight:600">'+fmtSP(v.dsp)+'</td>'+
        '<td>'+fmtSP(v.isp)+'</td><td>'+fmtSP(v.tsp)+'</td><td>'+(v.noSP||'0')+'</td>'+
        '<td>'+(p!==null?'<span class="pill '+(p>=60?'green':(p>=35?'yellow':'red'))+'">'+p+'%</span>':'—')+'</td></tr>';
    }).join('');
    const closedCnt=list.filter(s=>s.state==='closed'&&!String(s.id).startsWith('bl-')).length;
    html+='<div class="panel"><h2>👤 Desempenho por Dev/QA — '+esc(sprintLabel(a))+'</h2>'+
      '<p class="panel-sub">Responsável (assignee) das issues da sprint atual, sem subtarefas e sem canceladas.</p>'+
      '<table><thead><tr><th>Dev / QA</th><th>Issues atrib.</th><th>Issues concl.</th><th>SP atribuídos</th><th>SP entregues</th><th>SP em andamento</th><th>SP não iniciados</th><th>Sem SP</th><th>% SP entregue</th></tr></thead><tbody>'+rowsD+
      '<tr class="total-row"><td>TOTAL</td><td>'+totD.n+'</td><td>'+totD.dn+'</td><td>'+fmtSP(totD.sp)+'</td><td>'+fmtSP(totD.dsp)+'</td><td>'+fmtSP(totD.isp)+'</td><td>'+fmtSP(totD.tsp)+'</td><td>'+totD.noSP+'</td>'+
      '<td>'+(totD.sp>0?pct(totD.dsp,totD.sp)+'%':'—')+'</td></tr>'+
      '</tbody></table></div>';
    // Matriz Dev/QA × Sprint: entregas (e alocação) por sprint + média final
    const realS=list.filter(s=>!String(s.id).startsWith('bl-'));
    const cellD=(v,s)=>{
      const b=(v.by||{})[s.id];
      if(!b||(!b.aN&&!b.dN)) return '<td style="color:var(--text-disabled)">—</td>';
      return '<td style="white-space:nowrap"><strong style="color:var(--verde)">'+fmtSP(b.dSP)+' SP</strong> · '+b.dN+' tsk'+
        '<br><small style="color:var(--text-secondary)">aloc. '+fmtSP(b.aSP)+' SP · '+b.aN+'</small></td>';
    };
    html+='<div class="panel"><h2>📊 Entregas por Dev/QA × Sprint</h2>'+
      '<p class="panel-sub">Por sprint: <strong style="color:var(--verde)">entregue</strong> (SP · tarefas, atribuído à sprint em que a issue foi concluída) e, abaixo, o alocado. <strong>Média final</strong> = entregue ÷ '+closedCnt+' sprints fechadas em que participou — recalcula ao vivo quando cada sprint encerra (a atual entra ao fechar).</p>'+
      '<table><thead><tr><th>Dev / QA</th>'+realS.map(s=>'<th>'+esc(sprintLabel(s))+(s.state==='active'?' ⬅️ atual':'')+'</th>').join('')+'<th>Média final /sprint</th></tr></thead><tbody>'+
      d.devs.map(v=>'<tr><td'+(v.name==='Sem responsável'?' style="color:var(--text-disabled);font-style:italic"':' style="font-weight:600"')+'>'+esc(v.name)+'</td>'+
        realS.map(s=>cellD(v,s)).join('')+
        '<td style="white-space:nowrap;background:rgba(78,203,113,.06)"><strong>'+fmtSP(Math.round(v.avgSP*100)/100)+' SP</strong> · '+(Math.round(v.avgN*10)/10)+' tarefas<br><small style="color:var(--text-secondary)">'+v.partN+' sprint(s) fechada(s)</small></td></tr>').join('')+
      '</tbody></table></div>';
  }
  html+='<div class="panel"><h2>Velocity — Scope vs Delivered</h2><div class="chart-holder"><canvas id="map_vel"></canvas></div></div>';
  el.innerHTML=html;
  const ctx=document.getElementById('map_vel');
  charts.push(new Chart(ctx,{type:'bar',data:{labels:list.map(sprintLabel),datasets:[
    {label:'Scope SP',data:list.map(s=>scopeOf(s)),backgroundColor:'rgba(30,164,193,.35)',borderColor:'#1EA4C1',borderWidth:1},
    {label:'Delivered SP',data:list.map(s=>s.state==='active'?s.doneSP:s.delivered),backgroundColor:'rgba(78,203,113,.5)',borderColor:'#4ECB71',borderWidth:1}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#AAAAAA',font:{size:11}}}},
    scales:{x:{ticks:{color:'#666'},grid:{display:false}},y:{beginAtZero:true,ticks:{color:'#666'},grid:{color:'rgba(255,255,255,.05)'}}}}}));
}

/* ---------- Criar Weekly (Confluence) ---------- */
function confStatus(p, day){
  let c='blue'; const ideal=Math.round(day/WORKDAYS*100);
  if(day>2){ c = p>=ideal-5?'green':(p>=ideal*0.5?'yellow':'red'); }
  return '<span data-type="status" data-color="'+c+'">'+p+'%</span>';
}
function buildConfluenceBody(){
  const today=new Date();
  const acts=SQUADS.map(s=>DATA[s.code].active).filter(Boolean);
  const a0=acts.slice().sort((x,y)=>x.start-y.start)[Math.floor(acts.length/2)]||acts[0];
  const sprintN=sprintLabel(a0);
  const day=Math.max(...acts.map(a=>a.day));
  const dstr=d=>d.getDate()+' '+MONTHS_EN[d.getMonth()]+' '+d.getFullYear();
  let totScope=0,totDone=0;
  let body='<p><strong>'+esc(sprintN)+'</strong> · '+dstr(a0.start)+' → '+dstr(a0.end)+' · Day '+day+' of '+WORKDAYS+' · Last updated: '+dstr(today)+'</p>';
  body+='<div data-type="panel-info"><p>Numbers are read live from the Jira boards as SP by status category (To Do + In Progress + Done), excluding sub-tasks and <strong>excluding cancelled issues</strong> (CANCEL-type statuses carry the “done” category in Jira but are not delivered work — they are removed from scope and reported separately). Two completion metrics are shown because they can diverge: <strong>% Done (SP)</strong> = Completed SP ÷ Scope SP (consistent with the burndown) and <strong>% Done (issues)</strong> = ticket count, as in Jira’s “Sprint progress” gadget.</p></div>';
  body+='<h2>Overview — '+esc(sprintN)+'</h2><table data-layout="default"><tbody><tr><th><p>Squad</p></th><th><p>Sprint Goal</p></th><th><p>Scope SP</p></th><th><p>Completed SP</p></th><th><p>% Done (SP)</p></th><th><p>% Done (issues)</p></th></tr>';
  for(const sq of SQUADS){
    const a=DATA[sq.code].active; if(!a) continue;
    totScope+=a.badgeScope; totDone+=a.doneSP;
    body+='<tr><td><p><strong>'+sq.name+'</strong></p></td><td><p>'+esc((a.goal||'—').split('\n').slice(0,4).join(' · '))+'</p></td><td><p>'+fmtSP(a.badgeScope)+'</p></td><td><p>'+fmtSP(a.doneSP)+'</p></td><td><p>'+confStatus(pct(a.doneSP,a.badgeScope),a.day)+'</p></td><td><p>'+confStatus(pct(a.doneN,a.todoN+a.inprogN+a.doneN),a.day)+'</p></td></tr>';
  }
  body+='<tr><td><p><strong>Total</strong></p></td><td><p>—</p></td><td><p><strong>'+fmtSP(totScope)+'</strong></p></td><td><p><strong>'+fmtSP(totDone)+'</strong></p></td><td><p><strong>'+pct(totDone,totScope)+'%</strong></p></td><td><p>—</p></td></tr></tbody></table>';
  for(const sq of SQUADS){
    const d=DATA[sq.code], a=d.active; if(!a) continue;
    const pSP=pct(a.doneSP,a.badgeScope), pIss=pct(a.doneN,a.todoN+a.inprogN+a.doneN);
    const idealRem=+(a.badgeScope*(1-a.day/WORKDAYS)).toFixed(1);
    const diff=+(a.remaining-idealRem).toFixed(1);
    const diffTxt=diff>0.5?('+'+diff+' behind'):(diff<-0.5?(diff+' ahead'):'on track');
    body+='<hr /><h2>'+sq.name+'</h2>';
    const nl2p=t=>String(t).split('\n').filter(l=>l.trim()).map(l=>'<p>'+esc(l)+'</p>').join('')||'<p>—</p>';
    const agrVal=f=>localStorage.getItem('wh_agr_'+sq.code+'_'+a.id+'_'+f)||'';
    const delivBody=(a.deliveries||[]).slice(0,7).map(([nm,g])=>{
      const tN=g.n-g.dn-g.inN, tSP=g.sp-g.dsp-g.insp;
      return '<p><strong>'+esc(nm)+'</strong> ('+fmtSP(g.sp)+' SP · '+g.n+' issues): <span data-type="status" data-color="green">'+g.dn+' done · '+fmtSP(g.dsp)+' SP</span> <span data-type="status" data-color="blue">'+g.inN+' in progress · '+fmtSP(g.insp)+' SP</span> <span data-type="status" data-color="neutral">'+tN+' not started · '+fmtSP(tSP)+' SP</span></p>'+
        (g.ex&&g.ex.length?'<p><em>e.g.: '+esc(g.ex.map(s=>s.slice(0,80)).join(' · '))+'</em></p>':'');
    }).join('')||'<p>—</p>';
    const doneBody=(a.doneList&&a.doneList.length)
      ? a.doneList.slice(0,12).map(t=>'<p>✅ <strong>'+esc(t.key)+'</strong> — '+esc(t.summary.slice(0,100))+' ('+fmtSP(t.sp)+' SP)</p>').join('')
        +(a.doneList.length>12?'<p><em>… +'+(a.doneList.length-12)+' more</em></p>':'')
      : '<p>No tasks completed yet in this sprint.</p>';
    body+='<h3>Sprint Agreements</h3><table data-layout="default"><tbody>'+
      '<tr><th><p>Sprint Goal</p></th><td>'+nl2p(a.goal||'No goal set in Jira')+'</td></tr>'+
      '<tr><th><p>Main Deliveries</p></th><td>'+delivBody+'</td></tr>'+
      '<tr><th><p>Completed Tasks ('+(a.doneList?a.doneList.length:0)+')</p></th><td>'+doneBody+'</td></tr>'+
      '<tr><th><p>Period</p></th><td><p>'+dstr(a.start)+' → '+dstr(a.end)+'</p></td></tr>'+
      '<tr><th><p>Sprint Constraints</p></th><td>'+nl2p(agrVal('constraints'))+'</td></tr>'+
      '<tr><th><p>Risks</p></th><td>'+nl2p(agrVal('risks'))+'</td></tr>'+
      '<tr><th><p>Validations</p></th><td>'+nl2p(agrVal('validations'))+'</td></tr>'+
      '</tbody></table>';
    body+='<h3>Sprint Health (Day '+a.day+'/'+WORKDAYS+')</h3><table data-layout="default"><tbody>'+
      '<tr><th><p>Metric</p></th><th><p>Value</p></th><th><p>Status</p></th></tr>'+
      '<tr><td><p><strong>Scope SP</strong></p></td><td><p>'+fmtSP(a.badgeScope)+' SP ('+(a.todoN+a.inprogN+a.doneN)+' issues)</p></td><td><p>—</p></td></tr>'+
      '<tr><td><p><strong>Completed SP</strong></p></td><td><p>'+fmtSP(a.doneSP)+' SP</p></td><td><p>'+confStatus(pSP,a.day)+'</p></td></tr>'+
      '<tr><td><p><strong>Remaining SP</strong></p></td><td><p>'+fmtSP(a.remaining)+' SP ('+a.todoN+' to do · '+a.inprogN+' in progress)</p></td><td><p>—</p></td></tr>'+
      '<tr><td><p><strong>Sprint progress (by issues)</strong></p></td><td><p>'+pIss+'% ('+a.doneN+'/'+(a.todoN+a.inprogN+a.doneN)+')</p></td><td><p>'+confStatus(pIss,a.day)+'</p></td></tr>'+
      (()=>{const pd=pct(a.doneSP,a.badgeScope), pi2=pct(a.inprogSP,a.badgeScope), pn=Math.max(0,100-pd-pi2);
        return '<tr><td><p><strong>Sprint progress (by SP)</strong></p></td><td><p><span data-type="status" data-color="green">'+pd+'% done</span> <span data-type="status" data-color="blue">'+pi2+'% in progress</span> <span data-type="status" data-color="neutral">'+pn+'% not started</span></p></td><td><p>mirrors Jira’s gadget</p></td></tr>';})()+
      (a.cancSP>0?'<tr><td><p><strong>Cancelled (out of scope)</strong></p></td><td><p>'+fmtSP(a.cancSP)+' SP ('+a.cancN+' issues in CANCEL-type statuses)</p></td><td><p><span data-type="status" data-color="neutral">excluded</span></p></td></tr>':'')+
      '</tbody></table>';
    body+='<h3>Burndown — '+sq.code+' '+esc(sprintLabel(a))+'</h3>'+
      '<p>Scope: '+fmtSP(a.badgeScope)+' SP · Ideal pace: '+fmtSP(a.badgeScope/WORKDAYS)+' SP/day</p>'+
      '<table data-layout="default"><tbody><tr><th><p>Day</p></th><th><p>Ideal (SP remaining)</p></th><th><p>Actual (SP remaining)</p></th><th><p>Difference</p></th></tr>'+
      '<tr><td><p>Start</p></td><td><p>'+fmtSP(a.badgeScope)+'</p></td><td><p>'+fmtSP(a.badgeScope)+'</p></td><td><p>—</p></td></tr>'+
      '<tr><td><p><strong>Day '+a.day+' (today)</strong></p></td><td><p>'+idealRem+'</p></td><td><p><strong>'+fmtSP(a.remaining)+'</strong></p></td><td><p><strong>'+diffTxt+'</strong></p></td></tr>'+
      '<tr><td><p>Day 15</p></td><td><p>0</p></td><td><p>—</p></td><td><p>—</p></td></tr></tbody></table>'+
      '<p><a href="'+boardUrl(sq)+'">↗ Open Sprint Insights in Jira ('+sq.code+') — Sprint progress + Burndown</a></p>';
    if(a.day>3 && pSP < Math.round(a.day/WORKDAYS*100)*0.4){
      body+='<div data-type="panel-warning"><p><strong>Attention:</strong> '+sq.name+' is significantly behind the ideal burndown ('+pSP+'% SP done on day '+a.day+'). Re-prioritization recommended.</p></div>';
    }
  }
  body+='<hr /><h2>Consolidated — All Squads</h2><table data-layout="default"><tbody><tr><th><p>Squad</p></th><th><p>Scope</p></th><th><p>Completed</p></th><th><p>Remaining</p></th><th><p>% SP Done</p></th><th><p>% issues Done</p></th><th><p>Trend vs ideal</p></th></tr>';
  for(const sq of SQUADS){
    const a=DATA[sq.code].active; if(!a) continue;
    const idealRem=+(a.badgeScope*(1-a.day/WORKDAYS)).toFixed(1);
    const diff=+(a.remaining-idealRem).toFixed(1);
    body+='<tr><td><p><strong>'+sq.name+'</strong></p></td><td><p>'+fmtSP(a.badgeScope)+'</p></td><td><p>'+fmtSP(a.doneSP)+'</p></td><td><p>'+fmtSP(a.remaining)+'</p></td><td><p>'+confStatus(pct(a.doneSP,a.badgeScope),a.day)+'</p></td><td><p>'+confStatus(pct(a.doneN,a.todoN+a.inprogN+a.doneN),a.day)+'</p></td><td><p>'+(diff>0.5?'+'+diff+' SP behind':(diff<-0.5?Math.abs(diff)+' SP ahead':'on track'))+'</p></td></tr>';
  }
  body+='</tbody></table>';
  // ---- Comparative Map — Sprint History (closed sprints + current) ----
  body+='<hr /><h2>Comparative Map — Sprint History (per squad)</h2>';
  body+='<p>All sprints of each board, including closed ones. Closed sprints use the <strong>official numbers from the sprint reports</strong> (Jira badges read at the time); values marked with “≈” are reconstructed from current Jira fields (which do not preserve the sprint-time snapshot). Active sprint: live read, excluding sub-tasks and cancelled issues.</p>';
  for(const sq of SQUADS){
    const d=DATA[sq.code], list=d.sprints;
    if(!list.length) continue;
    const scopeOfC=s=>s.state==='active'?s.badgeScope:(s.scopeUnknown?null:s.scope);
    const mkC=s=>s.state==='closed'?(s.official?'':' ≈'):'';
    const closed=list.filter(s=>s.state==='closed');
    const avgDel=closed.length?closed.reduce((x,s)=>x+s.delivered,0)/closed.length:0;
    body+='<h3>'+sq.name+' ('+sq.code+')</h3>';
    body+='<table data-layout="default"><tbody><tr><th><p>Metric</p></th>'+list.map(s=>'<th><p>'+esc(sprintLabel(s))+(s.state==='active'?' (current)':'')+'<br/>'+(s.start?ddmm(s.start):'')+'–'+(s.end?ddmm(s.end):'')+'</p></th>').join('')+'</tr>';
    body+='<tr><td><p><strong>Scope SP</strong></p></td>'+list.map((s,i)=>{
      const prev=list[i-1]; const v=scopeOfC(s), pv=prev?scopeOfC(prev):null;
      const g=(pv>0&&v!=null)?Math.round((v-pv)/pv*100):null;
      return '<td><p>'+(v!=null?fmtSP(v):'—')+mkC(s)+(g!==null?' ('+(g>0?'+':'')+g+'%)':'')+'</p></td>';}).join('')+'</tr>';
    body+='<tr><td><p><strong>Delivered SP</strong></p></td>'+list.map(s=>'<td><p>'+(s.state==='active'?fmtSP(s.doneSP)+' (Day '+(s.day||'—')+')':fmtSP(s.delivered)+mkC(s))+'</p></td>').join('')+'</tr>';
    body+='<tr><td><p><strong>Delivery rate (SP)</strong></p></td>'+list.map(s=>{
      const sc=scopeOfC(s);
      if(s.state!=='active'&&sc==null) return '<td><p>—</p></td>';
      const p=s.state==='active'?pct(s.doneSP,s.badgeScope):pct(s.delivered,sc);
      const c=s.state==='active'?'blue':(p>=60?'green':(p>=30?'yellow':'red'));
      return '<td><p><span data-type="status" data-color="'+c+'">'+p+'%'+(s.state==='active'?' partial':'')+'</span></p></td>';}).join('')+'</tr>';
    body+='<tr><td><p><strong>Volume (cards)</strong></p></td>'+list.map(s=>'<td><p>'+(s.count?s.count+mkC(s):'—')+'</p></td>').join('')+'</tr>';
    body+='<tr><td><p><strong>Issues done</strong></p></td>'+list.map(s=>{
      const tot=s.state==='active'?(s.todoN+s.inprogN+s.doneN):(s.issuesTotal||s.count);
      const dn=s.state==='active'?s.doneN:s.doneCount;
      if(!tot) return '<td><p>—</p></td>';
      return '<td><p>'+pct(dn,tot)+'% ('+dn+'/'+tot+')'+mkC(s)+'</p></td>';}).join('')+'</tr>';
    body+='<tr><td><p><strong>Cancelled SP (out of scope)</strong></p></td>'+list.map(s=>'<td><p>'+(s.cancSP>0?fmtSP(s.cancSP)+' ('+s.cancN+')':'—')+'</p></td>').join('')+'</tr>';
    body+='<tr><td><p><strong>Sprint Goal</strong></p></td>'+list.map(s=>'<td><p>'+esc((s.goal||'—').split('\n')[0].slice(0,140))+'</p></td>').join('')+'</tr>';
    body+='</tbody></table>';
    const a=d.active;
    if(closed.length){
      body+='<p>Average delivered across '+closed.length+' closed sprint(s): <strong>'+fmtSP(avgDel)+' SP</strong>'+(a?' · current scope: <strong>'+fmtSP(a.badgeScope)+' SP</strong>':'')+'</p>';
      if(a && avgDel>0 && a.badgeScope>avgDel*1.3){
        body+='<div data-type="panel-warning"><p><strong>Overcommit risk:</strong> '+sq.name+' current scope ('+fmtSP(a.badgeScope)+' SP) is ~'+Math.round((a.badgeScope/avgDel-1)*100)+'% above the historical delivered average ('+fmtSP(avgDel)+' SP).</p></div>';
      }
    }
    // Team performance — Dev/QA × Sprint matrix (delivered per sprint + live final average)
    if(d.devs&&d.devs.length){
      const closedCnt=list.filter(s=>s.state==='closed'&&!String(s.id).startsWith('bl-')).length;
      const realS=list.filter(s=>!String(s.id).startsWith('bl-'));
      body+='<p><strong>Deliveries per Dev/QA × Sprint</strong> — per sprint: delivered SP · tasks (attributed to the sprint where the issue was completed), with allocation below. <strong>Final average</strong> = delivered ÷ '+closedCnt+' closed sprint(s) participated — recalculated live as each sprint closes. Sub-tasks and cancelled excluded; reconstructed from current Jira fields (≈).</p>';
      body+='<table data-layout="default"><tbody><tr><th><p>Dev / QA</p></th>'+realS.map(s=>'<th><p>'+esc(sprintLabel(s))+(s.state==='active'?' (current)':'')+'</p></th>').join('')+'<th><p>Final avg / sprint</p></th></tr>'+
        d.devs.map(v=>'<tr><td><p><strong>'+esc(v.name)+'</strong></p></td>'+
          realS.map(s=>{
            const b=(v.by||{})[s.id];
            if(!b||(!b.aN&&!b.dN)) return '<td><p>—</p></td>';
            return '<td><p><strong>'+fmtSP(b.dSP)+' SP</strong> · '+b.dN+' tasks</p><p><em>alloc. '+fmtSP(b.aSP)+' SP · '+b.aN+'</em></p></td>';
          }).join('')+
          '<td><p><strong>'+fmtSP(Math.round(v.avgSP*100)/100)+' SP</strong> · '+(Math.round(v.avgN*10)/10)+' tasks ('+v.partN+' spr.)</p></td></tr>').join('')+
        '</tbody></table>';
    }
  }
  // ---- Carryover — Inherited from the previous sprint ----
  body+='<hr /><h2>Carryover — Inherited From the Previous Sprint (per squad)</h2>';
  body+='<p>Issues (sub-tasks and cancelled excluded) present in the previous sprint AND in the following one, with current SP values. For the <strong>active sprint</strong>, the breakdown shows the current status of each inherited issue — early in the sprint, this is the status it migrated in. Jira does not preserve the handover status for closed sprints.</p>';
  for(const sq of SQUADS){
    const d=DATA[sq.code], list=d.sprints;
    if(list.length<2) continue;
    body+='<h3>'+sq.name+' ('+sq.code+')</h3>';
    body+='<table data-layout="default"><tbody><tr><th><p>Transition</p></th><th><p>Issues carried</p></th><th><p>SP carried</p></th><th><p>% of sprint scope</p></th></tr>';
    for(let i=1;i<list.length;i++){
      const prev=list[i-1], s=list[i];
      const lbl=sprintLabel(prev)+' → '+sprintLabel(s)+(s.state==='active'?' (current)':'');
      if(s.carryNA||s.carryN==null){ body+='<tr><td><p>'+lbl+'</p></td><td><p>—</p></td><td><p>—</p></td><td><p>—</p></td></tr>'; continue; }
      const sc=s.state==='active'?s.badgeScope:(s.scopeUnknown?null:s.scope);
      const p=sc?pct(s.carrySP,sc):null;
      const mkT=s.state==='closed'?' ≈':'';
      body+='<tr><td><p>'+lbl+'</p></td><td><p>'+s.carryN+'</p></td><td><p>'+fmtSP(s.carrySP)+mkT+'</p></td><td><p>'+(p!==null?'<span data-type="status" data-color="'+(p>40?'red':(p>20?'yellow':'green'))+'">'+p+'%'+mkT+'</span>':'—')+'</p></td></tr>';
    }
    body+='</tbody></table>';
    const a=d.active;
    if(a&&a.carryByStatus&&Object.keys(a.carryByStatus).length){
      const entries=Object.entries(a.carryByStatus).sort((x,y)=>y[1].sp-x[1].sp);
      body+='<p><strong>Carryover status — '+esc(sprintLabel(a))+' (Day '+a.day+')</strong></p>';
      body+='<table data-layout="default"><tbody><tr><th><p>Status</p></th><th><p>Issues</p></th><th><p>SP</p></th><th><p>% of carried SP</p></th></tr>'+
        entries.map(([st,v])=>'<tr><td><p><span data-type="status" data-color="'+(/conclu|done/i.test(st)?'green':(/pend|block|reject|wait/i.test(st)?'yellow':'blue'))+'">'+esc(st)+'</span></p></td><td><p>'+v.n+'</p></td><td><p>'+fmtSP(v.sp)+'</p></td><td><p>'+pct(v.sp,a.carrySP)+'%</p></td></tr>').join('')+
        '<tr><td><p><strong>Total</strong></p></td><td><p><strong>'+a.carryN+'</strong></p></td><td><p><strong>'+fmtSP(a.carrySP)+'</strong></p></td><td><p><strong>100%</strong></p></td></tr></tbody></table>';
      if(a.carrySP>0&&a.badgeScope>0&&a.carrySP/a.badgeScope>0.4){
        body+='<div data-type="panel-warning"><p><strong>High inheritance:</strong> '+pct(a.carrySP,a.badgeScope)+'% of '+sq.name+'’s current scope comes from the previous sprint — review whether these items are still priority before adding new scope.</p></div>';
      }
    }
  }
  body+='<p><em>Source: Jira boards via JQL — SP by status category (To Do + In Progress + Done), sub-tasks and cancelled issues excluded, read on '+dstr(today)+'. Burndown ideal projected over '+WORKDAYS+' working days; actuals shown for Start and the current day. Note: Jira’s on-board “Sprint progress” gadget may differ slightly on boards that display sub-task cards (e.g. AE). Generated from the Weekly Product Hub artifact.</em></p>';
  const title='Sprint Plan — Engineering Squads | '+sprintN+' · '+ddmm(a0.start)+' ~ '+ddmmyyyy(a0.end)+' (gen. '+String(today.getDate()).padStart(2,'0')+' '+MONTHS_EN[today.getMonth()]+' '+String(today.getHours()).padStart(2,'0')+':'+String(today.getMinutes()).padStart(2,'0')+')';
  return {title, body};
}

async function ensureMonthFolder(){
  const today=new Date();
  const want=MONTHS_PT[today.getMonth()]+'/'+today.getFullYear();
  const d=parseResult(await window.cowork.callMcpTool(T_DESC,{cloudId:CLOUD,pageId:OKRS_PAGE,depth:5,limit:200}));
  const nodes=d.results||d.nodes||[];
  const found=nodes.find(n=>n.parentId===WPM_FOLDER && (n.title||'').trim()===want);
  if(found) return {id:found.id, created:false, name:want};
  const c=parseResult(await window.cowork.callMcpTool(T_CREATE,{cloudId:CLOUD,spaceId:SPACE_ID,parentId:WPM_FOLDER,title:want,contentFormat:'html',body:'<p>Weekly Product Meeting — '+want+'</p>'}));
  const id=(c.page&&c.page.id)||c.id||(c.content&&c.content.id);
  return {id, created:true, name:want};
}

async function criarWeekly(){
  const btn=document.getElementById('btnWeekly'), st=document.getElementById('ctaStatus');
  btn.disabled=true;
  try{
    st.textContent='1/3 · Localizando pasta do mês…';
    const folder=await ensureMonthFolder();
    console.log('[weekly-hub] month folder',JSON.stringify(folder));
    st.textContent='2/3 · Gerando conteúdo ('+folder.name+(folder.created?' · criada':'')+')…';
    const {title,body}=buildConfluenceBody();
    st.textContent='3/3 · Publicando página no Confluence…';
    const r=parseResult(await window.cowork.callMcpTool(T_CREATE,{cloudId:CLOUD,spaceId:SPACE_ID,parentId:String(folder.id),title,contentFormat:'html',body}));
    console.log('[weekly-hub] createConfluencePage result keys:',Object.keys(r||{}));
    const pg=r.page||r.content||r;
    const id=pg.id||'';
    let url=(pg._links&&(pg._links.base||'https://shippify.atlassian.net/wiki')+pg._links.webui)||'';
    if(!url&&pg.webUrl) url=pg.webUrl;
    if(!url&&id) url='https://shippify.atlassian.net/wiki/spaces/Products/pages/'+id;
    st.innerHTML='✅ Weekly criada em <strong>'+esc(folder.name)+'</strong>'+(folder.created?' (pasta nova)':'')+' — '+(url?'<a href="'+url+'" target="_blank">abrir página no Confluence ↗</a>':'publicada com sucesso');
  }catch(e){
    console.error('[weekly-hub] criarWeekly error',e);
    st.innerHTML='❌ Falha ao criar a Weekly: '+esc(e.message||e);
  }finally{ btn.disabled=false; }
}

/* ---------- boot ---------- */
function showView(v){
  localStorage.setItem('wh_view',v);
  document.querySelectorAll('#viewTabs button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.getElementById('viewPlan').classList.toggle('hidden',v!=='plan');
  document.getElementById('viewMap').classList.toggle('hidden',v!=='map');
  if(DATA){ if(v==='plan') renderPlan(); else {renderMapTabs();renderMap();} }
}
document.querySelectorAll('#viewTabs button').forEach(b=>b.onclick=()=>showView(b.dataset.view));
document.getElementById('btnRefresh').onclick=()=>location.reload();

/* ---------- Exportar site estático (GitHub Pages) ---------- */
function exportStatic(){
  // Garante as duas visões renderizadas (o export é um snapshot do DOM)
  renderPlan(); renderMapTabs(); renderMap();
  const clone=document.documentElement.cloneNode(true);
  // canvases (Chart.js) viram imagens
  const live=document.querySelectorAll('canvas'), cl=clone.querySelectorAll('canvas');
  live.forEach((c,i)=>{ if(!cl[i])return; const img=document.createElement('img');
    try{img.src=c.toDataURL('image/png');}catch(e){}
    img.style.cssText='width:100%;max-height:300px;object-fit:contain'; cl[i].replaceWith(img); });
  // textareas viram texto fixo
  document.querySelectorAll('textarea[data-key]').forEach((t,i)=>{
    const ct=clone.querySelectorAll('textarea[data-key]')[i]; if(!ct)return;
    const dv=document.createElement('div'); dv.style.cssText='white-space:pre-line;font-size:12.5px';
    dv.textContent=t.value||'—'; ct.replaceWith(dv); });
  // remove scripts, botões de ação e mostra as duas visões empilhadas
  clone.querySelectorAll('script').forEach(s=>s.remove());
  const vp=clone.querySelector('#viewPlan'), vm=clone.querySelector('#viewMap');
  if(vp)vp.classList.remove('hidden'); if(vm)vm.classList.remove('hidden');
  const cta=clone.querySelector('.cta'); if(cta)cta.remove();
  const tabs=clone.querySelector('#viewTabs'); if(tabs)tabs.remove();
  const now=new Date();
  const stamp=ddmm(now)+'/'+now.getFullYear()+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const banner=clone.querySelector('#subtitle');
  if(banner) banner.outerHTML='<p class="subtitle">📌 Snapshot estático gerado em <strong>'+stamp+'</strong> a partir do Jira. '+
    '<span style="color:var(--amarelo)">🔄 Recalcular:</span> abra o Weekly Product Hub no Cowork (dados vivos), clique em Exportar e substitua o index.html no GitHub — republica sozinho em ~1 min.</p>';
  const blob=new Blob(['<!DOCTYPE html>\n'+clone.outerHTML],{type:'text/html'});
  const aEl=document.createElement('a');
  aEl.href=URL.createObjectURL(blob); aEl.download='index.html'; aEl.click();
  URL.revokeObjectURL(aEl.href);
  document.getElementById('ctaStatus').innerHTML='✅ <strong>index.html</strong> baixado. Publicar: github.com → New repository (Public) → Add file → Upload files → arrasta o index.html → Commit → Settings → Pages → Deploy from branch (main/root). Site em https://[usuário].github.io/[repo]/ em 1-2 min.';
}
