<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Weekly Product Hub — Engineering Squads</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
  :root {
    color-scheme: dark;
    --bg-page:#151515; --bg-surface:#1E1E1E; --bg-card:#242424; --border:#2E2E2E;
    --text-primary:#EEEEEE; --text-secondary:#AAAAAA; --text-disabled:#666666;
    --verde:#4ECB71; --amarelo:#C19D1E; --laranja:#C1591E; --magenta:#C11E42; --violeta:#AA1EC1; --turquesa:#1EA4C1;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Geologica,Montserrat,Inter,Arial,sans-serif;background:var(--bg-page);color:var(--text-primary)}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 24px 60px}
  header.top{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px}
  h1{font-weight:800;font-size:25px;margin:0 0 6px}
  .subtitle{font-family:Montserrat,sans-serif;color:var(--text-secondary);font-size:13px;margin:0}
  .cta{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .btn-refresh{border:none;background:var(--turquesa);color:#06222B;padding:11px 20px;border-radius:8px;font-family:Geologica,sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:filter .15s}
  .btn-refresh:hover{filter:brightness(1.08)}
  .btn-refresh:disabled{opacity:.55;cursor:default}
  .cta-status{font-family:Montserrat,sans-serif;font-size:12px;color:var(--text-secondary);max-width:340px;text-align:right}
  .cta-status a{color:var(--turquesa);font-weight:600}
  .view-tabs{display:flex;gap:4px;background:var(--bg-surface);border:1px solid var(--border);padding:4px;border-radius:10px;width:fit-content;margin-bottom:18px}
  .view-tabs button{border:none;border-bottom:2px solid transparent;background:transparent;padding:9px 18px;border-radius:8px;font-family:Geologica,sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--text-secondary);transition:all .15s}
  .view-tabs button.active{background:var(--bg-card);color:var(--text-primary);border-bottom-color:var(--verde)}
  .squad-tabs{display:flex;gap:4px;background:var(--bg-surface);border:1px solid var(--border);padding:4px;border-radius:10px;width:fit-content;margin-bottom:16px}
  .squad-tabs button{border:none;background:transparent;padding:7px 14px;border-radius:8px;font-family:Geologica,sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-secondary)}
  .squad-tabs button.active{background:var(--bg-card);color:var(--text-primary);box-shadow:inset 0 -2px 0 var(--turquesa)}
  .panel{background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:20px 22px;margin-bottom:20px}
  .panel h2{font-size:16px;font-weight:600;margin:0 0 4px}
  .panel .panel-sub{font-family:Montserrat,sans-serif;font-size:12.5px;color:var(--text-secondary);margin:0 0 14px}
  table{width:100%;border-collapse:collapse;font-family:Montserrat,sans-serif;font-size:13px}
  th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:top}
  th{background:var(--bg-card);color:var(--text-secondary);font-family:Geologica,sans-serif;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
  tbody tr:nth-child(odd) td{background:rgba(255,255,255,.015)}
  tr.total-row td{font-weight:700;background:var(--bg-card)!important}
  tr.qa-row td{background:rgba(170,30,193,.08)!important;border-top:1px solid rgba(170,30,193,.35)}
  .pill{display:inline-block;padding:3px 10px;border-radius:4px;font-family:Geologica,sans-serif;font-size:11px;font-weight:600;letter-spacing:.03em;white-space:nowrap}
  .pill.green{background:rgba(78,203,113,.18);color:var(--verde)}
  .pill.yellow{background:rgba(193,157,30,.18);color:var(--amarelo)}
  .pill.red{background:rgba(193,30,66,.18);color:#E8557B}
  .pill.blue{background:rgba(30,164,193,.18);color:var(--turquesa)}
  .pill.purple{background:rgba(170,30,193,.18);color:#D06CE0}
  .pill.gray{background:rgba(255,255,255,.08);color:var(--text-secondary)}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
  .kpi-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
  .kpi-card .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
  .kpi-card .value{font-size:26px;font-weight:800}
  .kpi-card .delta{font-family:Montserrat,sans-serif;font-size:11.5px;margin-top:4px;color:var(--text-secondary)}
  .chart-holder{position:relative;height:260px}
  .squad-block{border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:16px;background:var(--bg-card)}
  .squad-block h3{margin:0 0 2px;font-size:15px}
  .squad-block .goal{font-family:Montserrat,sans-serif;font-size:12.5px;color:var(--text-secondary);margin:0 0 14px;white-space:pre-line}
  a.jira-link{color:var(--turquesa);text-decoration:none;font-family:Montserrat,sans-serif;font-size:12.5px;font-weight:600}
  a.jira-link:hover{text-decoration:underline}
  .alert-box{background:rgba(193,89,30,.12);border-left:4px solid var(--laranja);padding:14px 18px;border-radius:0 8px 8px 0;margin:14px 0}
  .alert-box h4{margin:0 0 6px;color:var(--laranja);font-size:13.5px}
  .alert-box p{margin:0;font-family:Montserrat,sans-serif;font-size:12.5px;color:var(--text-primary)}
  .loading{display:flex;align-items:center;gap:10px;padding:40px 0;justify-content:center;color:var(--text-secondary);font-size:13.5px;font-family:Montserrat,sans-serif}

  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(193,30,66,.12);border:1px solid var(--magenta);border-radius:8px;padding:14px 18px;font-family:Montserrat,sans-serif;font-size:13px;margin-bottom:16px}
  .footer{font-family:Montserrat,sans-serif;font-size:11.5px;color:var(--text-disabled);margin-top:28px;border-top:1px solid var(--border);padding-top:14px;line-height:1.6}

  table.agr th{width:150px;vertical-align:top;background:rgba(30,164,193,.10);color:var(--text-primary);font-size:12px;text-transform:none;letter-spacing:0}
  table.agr td{white-space:pre-line}
  .agr textarea{width:100%;min-height:44px;background:var(--bg-page);border:1px dashed var(--border);border-radius:6px;color:var(--text-primary);font-family:Montserrat,sans-serif;font-size:12.5px;padding:8px;resize:vertical;white-space:pre-line}
  .agr textarea:focus{outline:none;border-color:var(--turquesa)}
  .agr textarea::placeholder{color:var(--text-disabled)}
  .deliv{margin:2px 0 10px;font-size:12.5px}
  .deliv .pill{margin-left:6px}
  .deliv small.brk{color:var(--text-secondary);font-size:11.5px}
  .sbar{display:flex;height:9px;border-radius:5px;overflow:hidden;background:rgba(255,255,255,.10);margin:5px 0 3px;max-width:460px}
  .sbar>div{height:100%}
  .sbar.lg{height:16px;max-width:none;margin:6px 0 8px}
  .sbar-legend{display:flex;gap:26px;font-family:Montserrat,sans-serif;font-size:12px;color:var(--text-secondary);margin-bottom:14px;flex-wrap:wrap}
  .sbar-legend b{font-size:16px;display:block;font-family:Geologica,sans-serif}
</style>

<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>Weekly Product — Engineering Squads</h1>

  <div class="view-tabs" id="viewTabs">

<script>
// Campos de pontos (validados em 17/07/2026 contra OE Sprint 5):
//   customfield_10028 "Story Points"      = TOTAL da issue (já é a somatória DEV + QA)
//   customfield_10546 "Story point QA"    = parcela de QA
//   customfield_10548 "Story point total" = parcela de DEV  (10028 = 10546 + 10548)
const SP_FIELD = 'customfield_10028';
const QA_FIELD = 'customfield_10546';
const SPRINT_FIELD = 'customfield_10020';
// Proxy serverless (Cloudflare Worker) para consulta ao Jira em tempo real, sem exigir login/token
// de quem acessa o site. Preencha com a URL pública do Worker depois do deploy
// (Settings > Variables and Secrets > JIRA_EMAIL / JIRA_API_TOKEN), ex.:
// 'https://weekly-hub-proxy.SEU-USUARIO.workers.dev'. Vazio = usa só o data.json (fallback).
const LIVE_ENDPOINT = 'https://weekly-hub-proxy.vitor-lousada-t.workers.dev';
// QA de cada squad — os pontos de QA vivem no campo "Story point QA" das histórias/tarefas/bugs.
// A responsabilidade (assignee) das tarefas NUNCA passa para o QA: a atribuição ao QA acontece
// quando a issue entra nos status pertinentes a QA. Regra:
//   não iniciado (QA) = PENDING QA (chegou ao QA, teste ainda não começou)
//   em andamento (QA) = ON TESTING (ON GOING QA) · QA VERIFIED (APPROVED BY QA) · QA DENIED (REJECTED BY QA)
//   entregue (QA)     = só DONE
// Issues ainda em dev (backlog, Sendo feito, CODE REVIEW…) NÃO contam como atribuídas ao QA.
const QA_OWNER = {
  AE:'Sairys — QA (sairys@shippify.co)',
  EE:'Mikael Ferreira — QA (mikael.ferreira.t@shippify.co)',
  OE:'Nathaly Brasiliano — QA (nathaly.brasiliano.t@shippify.co)',
};
const QA_PROG_RE = /(ON\s*GOING\s*QA|ON\s*TESTING|APPROVED\s*BY\s*QA|QA\s*VERIFIED|REJECTED\s*BY\s*QA|QA\s*DENIED)/i;
const QA_WAIT_RE = /PENDING\s*QA/i;
const SQUADS = [
  // NENHUMA squad inclui subtarefas: com a migração dos pontos para o campo Story Points
  // (DEV + QA) nos cards principais, incluir subtasks na AE duplicava pontos.
  // Validado em 17/07/2026 contra o badge do backlog AE Sprint 5: 35 + 5,5 + 39,5 = 80 SP.
  {code:'AE', name:'Apps Experience',      project:'AE', board:479},
  {code:'OE', name:'Operation Experience', project:'OE', board:474},
  {code:'EE', name:'Ecosystem Experience', project:'EE', board:475},
];
// BASELINES OFICIAIS de sprints FECHADAS — badges do Jira lidos na época (reports validados:
// anexo OE + Sprint Plans 5570562 e 22708225). Sprints fechadas não mudam mais; os campos atuais
// do Jira NÃO preservam a foto da época (commitment, SP re-estimados, clones herdam sprint field),
// então a reconstrução via JQL divergiria. Sem baseline → reconstrução, marcada com "≈".
const AGR_SUGGEST={
  AE:{sprint:'Sprint 4',
    constraints:'No public holidays, but we are in the World Cup period — there may be matches / possible breaks.\nDeveloper Patrick on vacation from mid-sprint, returning halfway through Sprint 5 (08/07 ~ 20/07).',
    risks:'Deployment-related risks around the MM Phase 3 delivery and its tight deadline, compounded by interdependencies with other squads.\n13 carryover issues (14.75 SP) still in the post-dev pipeline (13 SP in CODE REVIEW) — closing them early frees the MM Phase 3 path.',
    validations:'Validation with the Amazon team (MM project) on July 8 — MM Phase 3 launched early to ensure "live" testing.\nPickup version (tokens) to Americanas/Abbiamo — deadline July 15; delivering earlier is a success.'},
  OE:{sprint:'Sprint 4',
    constraints:'World Cup period (possible match breaks).\nMM Phase 3 deadline July 8: QA-pipeline carryover (alert visibility / Smart Notification) must be closed before pulling new Control Tower scope (Sprint 3 retro recommendation: dedicated QA focus early in the sprint).\nTech Support bug backlog (OE-190, 5 SP) competes for dev capacity.',
    risks:'40% of the sprint scope (38 SP) is carryover from Sprint 3 sitting in the post-dev pipeline: 10.5 SP PENDING QA (incl. Smart Notification bugs OE-176/177/178) and 5.5 SP REJECTED BY QA (Companies — context menu, needs rework).\nQA throughput was the limiting factor in Sprint 3 — risk of repeating the pattern.\nControl Tower (OE-139/140/141, 26 SP) still not started with discovery (OE-180) in progress — estimate uncertainty on the sprint goal itself.',
    validations:'MM Phase 3 — alert visibility: validate final QA + deploy against the July 8 deadline.\nSmart Notification real-time fixes (OE-176/177/178) pending QA validation.\nControl Tower discovery (OE-180) outcomes to be validated with Operations before build starts.'},
  EE:{sprint:'Sprint 4',
    constraints:'Sprint goal not set in Jira (board 475) — recommend registering it on the sprint.\nRefinement placeholders (EE-147–151) reserve capacity for discovery rather than delivery.\nHigh Tech Support demand (EE-124 currently BLOCKED, EE-126 in progress).',
    risks:'72% of the sprint scope (53.25 SP) is carryover — 28 SP stuck in CODE REVIEW (Gamification EE-24, Smart Notification UX errors EE-18, IdWall sustainability EE-108) and 15 SP in QA.\nSprint 3 pattern (25% SP done, very heavy in-progress tickets) at risk of repeating.\nEE-124 (Tech Support) blocked — external dependency.',
    validations:'IdWall: upload format fix (EE-101) waiting for deploy; service sustainability (EE-108) in review — validate the end-to-end flow.\nGiuliana Flores max-distance block (EE-144, approved by QA) — validate with the client.\nFleet file validation (EE-136) waiting for deploy — validate with Operations.'},
};
const S1P={start:'2026-05-19',end:'2026-06-01'}, S2P={start:'2026-06-02',end:'2026-06-16'}, S3P={start:'2026-06-16',end:'2026-06-30'};
const BASELINES = {
  AE: {
    'Sprint 1': {scope:null,   delivered:44.5, ...S1P},
    'Sprint 2': {scope:148.75, delivered:75.25, ...S2P},
    'Sprint 3': {scope:90.25,  delivered:68.75, issuesDone:52, issuesTotal:66, ...S3P},
  },
  OE: {
    'Sprint 1': {scope:22.5,  delivered:9.25, volume:25, ...S1P},
    'Sprint 2': {scope:53.25, delivered:5.5,  volume:55, ...S2P},
    'Sprint 3': {scope:65.75, delivered:46.5, volume:46, issuesDone:26, issuesTotal:46, ...S3P},
  },
  EE: {
    'Sprint 1': {scope:60,    delivered:28, ...S1P},
    'Sprint 2': {scope:42.25, delivered:31, ...S2P},
    'Sprint 3': {scope:89.25, delivered:22, issuesDone:13, issuesTotal:23, ...S3P},
  },
};
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTHS_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WORKDAYS = 15;
let DATA = null;
let charts = [];

const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtSP = n => (Math.round(n*100)/100).toString();
const pct = (a,b) => b>0 ? Math.round(a/b*100) : 0;
const ddmm = d => String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
const ddmmyyyy = d => ddmm(d)+'/'+d.getFullYear();

function workdayIndex(start, today){
  // business days elapsed from sprint start (inclusive) to today
  let d=new Date(start); d.setHours(0,0,0,0);
  const t=new Date(today); t.setHours(0,0,0,0);
  let n=0;
  while(d<=t && n<WORKDAYS){
    const wd=d.getDay();
    if(wd!==0 && wd!==6) n++;
    d.setDate(d.getDate()+1);
  }
  return Math.max(1, n);
}

function processSquad(sq, nodes, report){
  const recs = []; // registro por issue p/ análise de carryover
  const sprints = new Map(); // id -> sprint aggregate
  const getS = s => {
    if(!sprints.has(s.id)) sprints.set(s.id,{id:s.id,name:s.name,state:s.state,goal:s.goal||'',
      start:s.startDate?new Date(s.startDate):null,end:s.endDate?new Date(s.endDate):null,
      scope:0,count:0,delivered:0,doneCount:0,todoSP:0,inprogSP:0,doneSP:0,todoN:0,inprogN:0,doneN:0,cancSP:0,cancN:0});
    return sprints.get(s.id);
  };
  for(const n of nodes){
    const f=n.fields||{};
    const sp = typeof f[SP_FIELD]==='number' ? f[SP_FIELD] : 0;
    const cat = f.status && f.status.statusCategory ? f.status.statusCategory.key : 'new';
    // CANCEL/CANCELED etc. have status category "done" in Jira but are NOT delivered work:
    // they must leave the scope and never count as completed (root cause of the AE distortion).
    const cancelled = cat==='done' && /cancel|discard|descart/i.test((f.status&&f.status.name)||'');
    const res = f.resolutiondate ? new Date(f.resolutiondate) : null;
    const mySprints = (Array.isArray(f[SPRINT_FIELD])?f[SPRINT_FIELD]:[]).filter(s=>s.boardId===sq.board);
    if(!mySprints.length) continue;
    const sorted = mySprints.slice().sort((a,b)=>new Date(a.startDate||0)-new Date(b.startDate||0));
    recs.push({key:n.key, sp, cat, cancelled, status:(f.status&&f.status.name)||'—', ids:sorted.map(x=>x.id),
      summary:f.summary||'', epic:(f.parent&&f.parent.fields&&f.parent.fields.summary)||null,
      assignee:(f.assignee&&f.assignee.displayName)||null, spNull:f[SP_FIELD]==null,
      spqa:(typeof f[QA_FIELD]==='number'?f[QA_FIELD]:null)});
    const rec=recs[recs.length-1];
    for(const s of sorted){ const agg=getS(s); if(cancelled){agg.cancSP+=sp;agg.cancN++;} else {agg.scope+=sp;agg.count++;} }
    // active-sprint badges (non-subtask issues by status category, cancelled excluded)
    const act = sorted.find(s=>s.state==='active');
    if(act && !cancelled){
      const a=getS(act);
      if(cat==='done'){a.doneSP+=sp;a.doneN++;} else if(cat==='indeterminate'){a.inprogSP+=sp;a.inprogN++;} else {a.todoSP+=sp;a.todoN++;}
    }
    // delivered attribution for history (cancelled never counts as delivered)
    if(cat==='done' && !cancelled){
      let target=null;
      if(res){
        target = sorted.find(s=>{
          const st=s.startDate?new Date(s.startDate):null, en=s.endDate?new Date(s.endDate):null;
          return st&&en&&res>=st&&res<=new Date(en.getTime()+86400000);
        });
        if(!target) target = sorted.filter(s=>s.endDate&&new Date(s.endDate)>=res)[0] || sorted[sorted.length-1];
      } else target = sorted[sorted.length-1];
      const tg=getS(target); tg.delivered+=sp; tg.doneCount++;
      rec.delivClosed = target.state==='closed'; // entrega em sprint já fechada → conta na média por dev
      rec.delivSprintId = target.id; // sprint à qual a entrega foi atribuída (matriz dev × sprint)
    }
  }
  // Sprints "future" (planejadas, não iniciadas) ficam fora do mapa — entram quando ativarem
  const list=[...sprints.values()].filter(s=>s.state!=='future').sort((a,b)=>(a.start||0)-(b.start||0));
  // Sprints fechadas: sobrepõe com o baseline oficial (badges lidos na época) quando existir
  for(const s of list){
    if(s.state!=='closed') continue;
    const b=(BASELINES[sq.code]||{})[sprintLabel(s)];
    if(b){
      s.official=true;
      if(b.scope!=null) s.scope=b.scope; else s.scopeUnknown=true;
      if(b.delivered!=null) s.delivered=b.delivered;
      if(b.volume!=null) s.count=b.volume;
      if(b.issuesDone!=null){ s.doneCount=b.issuesDone; s.issuesTotal=b.issuesTotal; }
    }
  }
  // Sprints fechadas que não existem mais nos campos atuais (ex.: AE Sprint 1) entram só pelo baseline
  const labels=new Set(list.map(sprintLabel));
  for(const [nm,b] of Object.entries(BASELINES[sq.code]||{})){
    if(labels.has(nm)) continue;
    list.push({id:'bl-'+nm, name:nm, state:'closed', official:true, goal:'',
      start:b.start?new Date(b.start+'T12:00:00Z'):null, end:b.end?new Date(b.end+'T12:00:00Z'):null,
      scope:b.scope!=null?b.scope:0, scopeUnknown:b.scope==null,
      count:b.volume||0, delivered:b.delivered||0, doneCount:b.issuesDone||0, issuesTotal:b.issuesTotal||0,
      todoSP:0,inprogSP:0,doneSP:0,todoN:0,inprogN:0,doneN:0,cancSP:0,cancN:0});
  }
  list.sort((a,b)=>(a.start||0)-(b.start||0));
  // Carryover: issue presente na sprint anterior E na seguinte (exclui canceladas)
  for(let i=1;i<list.length;i++){
    const prev=list[i-1], cur=list[i];
    if(String(prev.id).startsWith('bl-')||String(cur.id).startsWith('bl-')){cur.carryNA=true;continue;}
    const carried=recs.filter(r=>!r.cancelled&&r.ids.includes(prev.id)&&r.ids.includes(cur.id));
    cur.carryN=carried.length;
    cur.carrySP=carried.reduce((x,r)=>x+r.sp,0);
    if(cur.state==='active'){
      const by={};
      for(const r of carried){const b=by[r.status]=by[r.status]||{n:0,sp:0};b.n++;b.sp+=r.sp;}
      cur.carryByStatus=by;
    }
  }
  const active=list.find(s=>s.state==='active')||null;
  if(active){
    active.badgeScope=active.todoSP+active.inprogSP+active.doneSP;
    active.remaining=active.todoSP+active.inprogSP;
    // TESTADO E REVERTIDO (20/07/2026): o endpoint "oficial" de relatório de sprint do Jira
    // (greenhopper/sprintreport, mesma fonte do Burndown nativo) usa uma FOTO desatualizada dos
    // pontos — quando testado ao vivo, AE aparecia com 1,25 SP concluído/42,75 SP de escopo,
    // contra o real de 64+ SP concluído/81 SP de escopo (confirmado issue a issue via JQL). OE e
    // EE bateram por coincidência, mas AE provou que essa fonte não é confiável em tempo real —
    // por isso NÃO usamos mais `report` para sobrescrever os números; o cálculo via JQL abaixo
    // (que já bate com o widget "Progresso do sprint" ao vivo do Jira) é a fonte da verdade.
    void report;
    active.day=workdayIndex(active.start,new Date());
    // Main deliveries: agrupa cards da sprint ativa por épico (parent) ou tag [XXX] do summary
    const acts=recs.filter(r=>!r.cancelled&&r.ids.includes(active.id));
    const gm={};
    for(const r of acts){
      const tag=(r.summary.match(/^\s*\[([^\]]{2,30})\]/)||[])[1];
      const k=r.epic||tag||'Outros / avulsos';
      const g=gm[k]=gm[k]||{n:0,sp:0,dn:0,dsp:0,inN:0,insp:0,ex:[]};
      g.n++; g.sp+=r.sp;
      if(g.ex.length<2&&r.summary&&!/^\s*\[?refin/i.test(r.summary)) g.ex.push(r.summary);
      if(r.cat==='done'){g.dn++; g.dsp+=r.sp;}
      else if(r.cat==='indeterminate'){g.inN++; g.insp+=r.sp;}
    }
    active.deliveries=Object.entries(gm).sort((a,b)=>b[1].sp-a[1].sp);
    active.doneList=acts.filter(r=>r.cat==='done').map(r=>({key:r.key,summary:r.summary,sp:r.sp}));
  }
  // Desempenho por Dev/QA (responsável): sprint atual + média entregue por sprint FECHADA (viva —
  // recalculada a cada sprint encerrada). Participação = sprints fechadas em que teve issues.
  const devMap={};
  const closedIds=new Set(list.filter(s=>s.state==='closed'&&!String(s.id).startsWith('bl-')).map(s=>s.id));
  for(const r of recs){
    if(r.cancelled) continue;
    const nm=r.assignee||'Sem responsável';
    const d=devMap[nm]=devMap[nm]||{name:nm,n:0,dn:0,sp:0,dsp:0,isp:0,tsp:0,noSP:0,histSP:0,histN:0,part:new Set(),by:{}};
    for(const sid of r.ids){
      if(closedIds.has(sid)) d.part.add(sid);
      const bs=d.by[sid]=d.by[sid]||{aSP:0,aN:0,dSP:0,dN:0};
      bs.aSP+=r.sp; bs.aN++;
    }
    if(r.cat==='done'&&r.delivSprintId!=null){
      const bs=d.by[r.delivSprintId]=d.by[r.delivSprintId]||{aSP:0,aN:0,dSP:0,dN:0};
      bs.dSP+=r.sp; bs.dN++;
    }
    if(r.cat==='done'&&r.delivClosed){ d.histSP+=r.sp; d.histN++; }
    if(active&&r.ids.includes(active.id)){
      d.n++; d.sp+=r.sp; if(r.spNull)d.noSP++;
      if(r.cat==='done'){d.dn++;d.dsp+=r.sp;}
      else if(r.cat==='indeterminate')d.isp+=r.sp;
      else d.tsp+=r.sp;
    }
  }
  const devs=Object.values(devMap)
    .filter(d=>d.n>0||d.histN>0)
    .map(d=>({...d,partN:d.part.size,avgSP:d.part.size?d.histSP/d.part.size:0,avgN:d.part.size?d.histN/d.part.size:0}))
    .sort((a,b)=>{if(a.name==='Sem responsável')return 1;if(b.name==='Sem responsável')return -1;return b.sp-a.sp;});
  // ---- QA da squad: pontos do campo "Story point QA" (customfield_10546) nas histórias/tarefas/bugs.
  // A atribuição ao QA só existe quando a issue está nos status de QA (ou já foi entregue).
  const qa={name:QA_OWNER[sq.code]||('QA — '+sq.code),isQA:true,
    n:0,dn:0,sp:0,dsp:0,isp:0,tsp:0,noSP:0,histSP:0,histN:0,part:new Set(),by:{}};
  for(const r of recs){
    if(r.cancelled) continue;
    const v=r.spqa;
    const inQA=QA_PROG_RE.test(r.status), waitQA=QA_WAIT_RE.test(r.status), doneQA=r.cat==='done';
    const assignedToQA=inQA||waitQA||doneQA;
    if(assignedToQA && v!=null && v>0){
      for(const sid of r.ids){
        if(closedIds.has(sid)) qa.part.add(sid);
        const bs=qa.by[sid]=qa.by[sid]||{aSP:0,aN:0,dSP:0,dN:0};
        bs.aSP+=v; bs.aN++;
      }
      if(doneQA&&r.delivSprintId!=null){
        const bs=qa.by[r.delivSprintId]=qa.by[r.delivSprintId]||{aSP:0,aN:0,dSP:0,dN:0};
        bs.dSP+=v; bs.dN++;
      }
      if(doneQA&&r.delivClosed){ qa.histSP+=v; qa.histN++; }
    }
    if(active&&r.ids.includes(active.id)){
      if(!assignedToQA) continue;                 // ainda em dev → não é do QA
      if(v==null){ qa.noSP++; continue; }         // no fluxo de QA sem estimativa de QA
      if(v<=0) continue;
      qa.n++; qa.sp+=v;
      if(doneQA){ qa.dn++; qa.dsp+=v; }
      else if(inQA) qa.isp+=v;                    // ON TESTING · QA VERIFIED · QA DENIED
      else qa.tsp+=v;                             // PENDING QA = atribuído, não iniciado
    }
  }
  const qaRow={...qa,partN:qa.part.size,avgSP:qa.part.size?qa.histSP/qa.part.size:0,avgN:qa.part.size?qa.histN/qa.part.size:0};
  // Resumo (Sprint Review) da última sprint FECHADA — formato da Retrospective/Rovo
  let review=null;
  const realClosed=list.filter(s=>s.state==='closed'&&!String(s.id).startsWith('bl-'));
  const lastC=realClosed[realClosed.length-1]||null;
  if(lastC){
    const inS=recs.filter(r=>r.ids.includes(lastC.id));
    const doneIn=inS.filter(r=>!r.cancelled&&r.cat==='done'&&r.delivSprintId===lastC.id);
    const cancIn=inS.filter(r=>r.cancelled);
    const openOut=inS.filter(r=>!r.cancelled&&!(r.cat==='done'&&r.delivSprintId===lastC.id));
    const gm={};
    for(const r of doneIn){const tag=(r.summary.match(/^\s*\[([^\]]{2,30})\]/)||[])[1];const k=r.epic||tag||'Outros';const g=gm[k]=gm[k]||{n:0,sp:0};g.n++;g.sp+=r.sp;}
    const pipe={};
    for(const r of openOut){const p=pipe[r.status]=pipe[r.status]||{n:0,sp:0};p.n++;p.sp+=r.sp;}
    review={s:lastC,
      wins:Object.entries(gm).sort((a,b)=>b[1].sp-a[1].sp).slice(0,4),
      pipe:Object.entries(pipe).sort((a,b)=>b[1].sp-a[1].sp),
      doneN:doneIn.length, doneSP:doneIn.reduce((x,r)=>x+r.sp,0),
      openN:openOut.length, openSP:openOut.reduce((x,r)=>x+r.sp,0),
      cancN:cancIn.length, cancSP:cancIn.reduce((x,r)=>x+r.sp,0)};
  }
  return {squad:sq, sprints:list, active, issueCount:nodes.length, devs, qa:qaRow, review};
}

// Tenta consultar o Jira agora mesmo via Worker (tempo real). Timeout curto para não travar
// a página se o Worker não estiver configurado/acessível — nesse caso volta null e cai no fallback.
async function fetchLive(timeoutMs){
  if(!LIVE_ENDPOINT) return null;
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),timeoutMs||12000);
  try{
    const r=await fetch(LIVE_ENDPOINT+'?t='+Date.now(),{signal:ctrl.signal,cache:'no-store'});
    clearTimeout(timer);
    if(!r.ok) return null;
    const d=await r.json();
    if(d.error) return null;
    return d;
  }catch(e){ clearTimeout(timer); return null; }
}

async function loadAll(){
  document.getElementById('loadingMsg').textContent=LIVE_ENDPOINT?'Consultando o Jira em tempo real…':'Carregando último snapshot…';
  let raw=await fetchLive();
  let live=!!raw;
  if(!raw){
    if(LIVE_ENDPOINT) document.getElementById('loadingMsg').textContent='Proxy indisponível — carregando último snapshot…';
    const resp=await fetch('data.json?v='+Date.now(),{cache:'no-store'});
    if(!resp.ok) throw new Error('Nem o proxy em tempo real nem o data.json de fallback responderam. No repositório: Settings > Secrets and variables > Actions > cadastre JIRA_EMAIL e JIRA_API_TOKEN, depois Actions > "Update data" > Run workflow.');
    raw=await resp.json();
  }
  window.__GEN__=raw.generatedAt;
  window.__LIVE__=live;
  const results={};
  for(const sq of SQUADS){ results[sq.code]=processSquad(sq,(raw.squads&&raw.squads[sq.code])||[],(raw.sprintReport&&raw.sprintReport[sq.code])||null); }
  return results;
}

function statusPill(p, day){
  if(day<=2 && p<10) return '<span class="pill blue">'+p+'% · início</span>';
  const ideal = Math.round(day/WORKDAYS*100);
  if(p>=ideal-5) return '<span class="pill green">'+p+'%</span>';
  if(p>=ideal*0.5) return '<span class="pill yellow">'+p+'%</span>';
  return '<span class="pill red">'+p+'%</span>';
}
function boardUrl(sq){return 'https://shippify.atlassian.net/jira/software/c/projects/'+sq.project+'/boards/'+sq.board+'?isInsightsOpen=true';}
function sprintLabel(s){return s? s.name.replace(/^EE\s+/,''):'—';}

  const avgDelivered=closed.length?closed.reduce((x,s)=>x+s.delivered,0)/closed.length:0;
  const a=d.active;
  const scopeOf=s=>s.state==='active'?s.badgeScope:(s.scopeUnknown?null:s.scope);
  const mk=s=>s.state==='closed'?(s.official?'':' <small title="reconstruído dos campos atuais">≈</small>'):'';

  const rowScope=list.map((s,i)=>{const prev=list[i-1];const v=scopeOf(s),pv=prev?scopeOf(prev):null;
    const g=(pv>0&&v!=null)?Math.round((v-pv)/pv*100):null;
    return '<td>'+(v!=null?fmtSP(v):'—')+mk(s)+(g!==null?' <span class="pill '+(g>30?'red':(g>0?'yellow':'green'))+'">'+(g>0?'+':'')+g+'%</span>':'')+'</td>';}).join('');

  const rowRate=list.map(s=>{const sc=scopeOf(s);
    if(s.state!=='active'&&sc==null) return '<td>—</td>';
    const p=s.state==='active'?pct(s.doneSP,s.badgeScope):pct(s.delivered,sc);
    const cls=s.state==='active'?'blue':(p>=60?'green':(p>=30?'yellow':'red'));
    return '<td><span class="pill '+cls+'">'+p+'%'+(s.state==='active'?' · andamento':'')+'</span></td>';}).join('');
  const rowVol=list.map(s=>'<td>'+(s.count?s.count+mk(s):'—')+'</td>').join('');
  const rowIss=list.map(s=>{const tot=s.state==='active'?(s.todoN+s.inprogN+s.doneN):(s.issuesTotal||s.count);
    const dn=s.state==='active'?s.doneN:s.doneCount;
    if(!tot) return '<td>—</td>';
    return '<td>'+pct(dn,tot)+'% <small>('+dn+'/'+tot+')</small>'+mk(s)+'</td>';}).join('');
  const rowGoal=list.map(s=>'<td style="min-width:160px;font-size:12px">'+esc((s.goal||'—').split('\n')[0].slice(0,120))+'</td>').join('');
  const rowCanc=list.map(s=>'<td>'+(s.cancSP>0?fmtSP(s.cancSP)+' <small>('+s.cancN+' issues)</small>':'—')+'</td>').join('');
  let html='<div class="panel"><h2>Métricas-chave — '+d.squad.name+' ('+curSquad+')</h2>'+
    '<p class="panel-sub">SP = campo <strong>Story Points</strong> (customfield_10028) — <strong>já é a somatória dos pontos de DEV + QA</strong> registrados nas histórias, tarefas e bugs. Sprints fechadas usam os <strong>números oficiais dos reports</strong> (badges do Jira lidos na época) — os campos atuais do Jira não preservam a foto da sprint (scope commitment, SP re-estimados, clones). Valores com "≈" são reconstruídos dos campos atuais. Sprint ativa: leitura ao vivo, excluindo subtarefas e canceladas.</p>'+
    '<table><thead><tr><th>Métrica</th>'+head+'</tr></thead><tbody>'+
    '<tr><td><strong>Scope SP</strong></td>'+rowScope+'</tr>'+
    '<tr><td><strong>Delivered SP</strong></td>'+rowDel+'</tr>'+
    '<tr><td><strong>Taxa SP (%)</strong></td>'+rowRate+'</tr>'+
    '<tr><td><strong>Volume de cards</strong></td>'+rowVol+'</tr>'+
    '<tr><td><strong>Issues Done (%)</strong></td>'+rowIss+'</tr>'+
    '<tr><td><strong>Cancelled SP</strong> <small>(fora do scope)</small></td>'+rowCanc+'</tr>'+
    '<tr><td><strong>Sprint Goal</strong></td>'+rowGoal+'</tr>'+
    '</tbody></table></div>';
  // 🏁 Resumo da sprint encerrada (formato Sprint Review)
  if(d.review){
    const r=d.review, s=r.s;
    const sc=(s.scopeUnknown?null:s.scope), del=s.delivered, rate=sc?pct(del,sc):null;
    const meta=rate==null?'—':(rate>=70?'✅ Atingida':(rate>=35?'⚠️ Parcial':'🔴 Não atingida'));
    const nextA=d.active;
    const recos=[];
    if(r.openSP>0) recos.push('Priorizar o fechamento do pipeline não concluído ('+fmtSP(r.openSP)+' SP em '+r.openN+' issues) antes de puxar escopo novo.');
    const qaSP=r.pipe.filter(([st])=>/qa|review/i.test(st)).reduce((x,[,v])=>x+v.sp,0);
    if(qaSP>=5) recos.push('QA/Code Review concentra '+fmtSP(qaSP)+' SP do que ficou aberto — considerar foco de QA no início da sprint.');
    if(nextA&&del>0&&nextA.badgeScope>del*1.3) recos.push('Scope da sprint atual ('+fmtSP(nextA.badgeScope)+' SP) está bem acima do entregue na sprint passada ('+fmtSP(del)+' SP) — revisar commitment.');
    html+='<div class="panel"><h2>🏁 Resumo — '+esc(sprintLabel(s))+' (encerrada'+(s.end?' em '+ddmm(s.end):'')+')</h2>'+
      '<p class="panel-sub">Formato Sprint Review. Gerado dos dados atuais do Jira — os status do que ficou aberto são os de HOJE (podem ter avançado desde a virada).</p>'+
      '<table><tbody>'+
      '<tr><th style="width:150px">Sprint Goal</th><td style="white-space:pre-line">'+esc((s.goal||'—'))+'</td></tr>'+
      '<tr><th>Visão geral</th><td>Scope <strong>'+(sc!=null?fmtSP(sc):'—')+' SP</strong> · Entregue <strong style="color:var(--verde)">'+fmtSP(del)+' SP</strong> '+(rate!=null?'<span class="pill '+(rate>=70?'green':(rate>=35?'yellow':'red'))+'">'+rate+'%</span>':'')+' · '+r.doneN+' issues concluídas · Meta: <strong>'+meta+'</strong></td></tr>'+
      '<tr><th>✅ Conquistas</th><td>'+(r.wins.length?r.wins.map(([nm,g])=>'<div class="deliv">• <strong>'+esc(nm)+'</strong> — '+fmtSP(g.sp)+' SP · '+g.n+' issues entregues</div>').join(''):'—')+'</td></tr>'+
      '<tr><th>🚧 Não concluído</th><td>'+(r.pipe.length?r.pipe.map(([st,v])=>'<span class="pill '+(/conclu|done/i.test(st)?'green':(/pend|block|reject|wait|qa|review/i.test(st)?'yellow':'blue'))+'" style="margin:2px 4px 2px 0">'+esc(st)+' · '+v.n+' · '+fmtSP(v.sp)+' SP</span>').join(' '):'Nada ficou aberto 🎉')+'<br><small style="color:var(--text-secondary)">'+r.openN+' issues · '+fmtSP(r.openSP)+' SP seguiram adiante</small></td></tr>'+
      '<tr><th>🔄 Escopo</th><td>'+(r.cancN?r.cancN+' issue(s) canceladas ('+fmtSP(r.cancSP)+' SP, fora do scope) · ':'')+'Carryover: '+r.openN+' issues / '+fmtSP(r.openSP)+' SP</td></tr>'+
      (recos.length?'<tr><th>🎯 Recomendações</th><td>'+recos.map(t=>'<div class="deliv">• '+t+'</div>').join('')+'</td></tr>':'')+
      '</tbody></table></div>';
  }
  if(a && avgDelivered>0 && a.badgeScope>avgDelivered*1.3){
    const over=Math.round((a.badgeScope/avgDelivered-1)*100);
    html+='<div class="alert-box"><h4>⚠️ '+esc(sprintLabel(a))+' — risco de overcommit</h4>'+
      '<p>Scope atual <strong>'+fmtSP(a.badgeScope)+' SP</strong> vs média entregue nas '+closed.length+' sprints fechadas: <strong>'+fmtSP(avgDelivered)+' SP</strong> → <strong>~'+over+'% acima</strong> da capacidade histórica.</p></div>';
  }
  // Carryover — herdado da sprint anterior
  html+='<div class="panel"><h2>📦 Carryover — herdado da sprint anterior</h2>'+
    '<p class="panel-sub">Issues (sem subtarefas, sem canceladas) presentes na sprint anterior E na seguinte — exatamente o que o “Complete Sprint” do Jira moveu adiante (o que voltou ao backlog não conta). <strong>≈ SP com estimativas ATUAIS</strong>: em transições entre sprints fechadas, re-estimativas posteriores podem inflar o valor vs. a foto da época (o Jira não preserva o SP nem o status da virada). Para a <strong>sprint ativa</strong>, o detalhamento mostra o status atual de cada issue herdada.</p>'+
    '<table><thead><tr><th>Transição</th><th>Issues herdadas</th><th>SP herdados</th><th>% do scope da sprint</th></tr></thead><tbody>'+
    list.slice(1).map((s,i)=>{
      const prev=list[i];
      const lbl=sprintLabel(prev)+' → '+sprintLabel(s)+(s.state==='active'?' ⬅️':'');
      if(s.carryNA||s.carryN==null) return '<tr><td>'+lbl+'</td><td>—</td><td>—</td><td>—</td></tr>';
      const sc=scopeOf(s);
      const p=sc?pct(s.carrySP,sc):null;
      const mkT=s.state==='closed'?' <small style="color:var(--text-secondary)" title="reconstruído com estimativas atuais — pode diferir da foto da época no Jira">≈</small>':'';
      return '<tr><td>'+lbl+'</td><td>'+s.carryN+'</td><td>'+fmtSP(s.carrySP)+mkT+'</td><td>'+(p!==null?'<span class="pill '+(p>40?'red':(p>20?'yellow':'green'))+'">'+p+'%'+(s.state==='closed'?' ≈':'')+'</span>':'—')+'</td></tr>';
    }).join('')+'</tbody></table>';
  if(a&&a.carryByStatus&&Object.keys(a.carryByStatus).length){
    const entries=Object.entries(a.carryByStatus).sort((x,y)=>y[1].sp-x[1].sp);
    html+='<h3 style="font-size:14px;margin:18px 0 8px">Em qual status o carryover está — '+esc(sprintLabel(a))+' (Day '+a.day+')</h3>'+
      '<table><thead><tr><th>Status</th><th>Issues</th><th>SP</th><th>% dos SP herdados</th></tr></thead><tbody>'+
      entries.map(([st,v])=>'<tr><td><span class="pill '+(/conclu|done/i.test(st)?'green':(/pend|block|reject|wait/i.test(st)?'yellow':'blue'))+'">'+esc(st)+'</span></td><td>'+v.n+'</td><td>'+fmtSP(v.sp)+'</td><td>'+pct(v.sp,a.carrySP)+'%</td></tr>').join('')+
      '<tr class="total-row"><td>Total</td><td>'+a.carryN+'</td><td>'+fmtSP(a.carrySP)+'</td><td>100%</td></tr></tbody></table>';
  }
  html+='</div>';
  // Desempenho por Dev/QA
  if(d.devs&&d.devs.length){
    const totD={n:0,dn:0,sp:0,dsp:0,isp:0,tsp:0,noSP:0,histSP:0,histN:0};
    const rowsD=d.devs.map(v=>{
      Object.keys(totD).forEach(k=>totD[k]+=v[k]||0);
      const p=v.sp>0?pct(v.dsp,v.sp):null;
      return '<tr><td'+(v.name==='Sem responsável'?' style="color:var(--text-disabled);font-style:italic"':' style="font-weight:600"')+'>'+esc(v.name)+'</td>'+
        '<td>'+v.n+'</td><td>'+v.dn+'</td><td>'+fmtSP(v.sp)+'</td><td style="color:var(--verde);font-weight:600">'+fmtSP(v.dsp)+'</td>'+
        '<td>'+fmtSP(v.isp)+'</td><td>'+fmtSP(v.tsp)+'</td><td>'+(v.noSP||'0')+'</td>'+
        '<td>'+(p!==null?'<span class="pill '+(p>=60?'green':(p>=35?'yellow':'red'))+'">'+p+'%</span>':'—')+'</td></tr>';
    }).join('');
    // Linha de QA da squad — campo "Story point QA" (customfield_10546) das issues da sprint
    const q=d.qa;
    const qaRowHtml=(q&&(q.n>0||q.histN>0||q.noSP>0))?(()=>{
      const p=q.sp>0?pct(q.dsp,q.sp):null;
      return '<tr class="qa-row"><td style="font-weight:600">🧪 '+esc(q.name)+' <span class="pill purple">Story point QA</span></td>'+
        '<td>'+q.n+'</td><td>'+q.dn+'</td><td>'+fmtSP(q.sp)+'</td><td style="color:var(--verde);font-weight:600">'+fmtSP(q.dsp)+'</td>'+
        '<td>'+fmtSP(q.isp)+'</td><td>'+fmtSP(q.tsp)+'</td><td>'+(q.noSP||'0')+'</td>'+
        '<td>'+(p!==null?'<span class="pill '+(p>=60?'green':(p>=35?'yellow':'red'))+'">'+p+'%</span>':'—')+'</td></tr>';
    })():'';
    const closedCnt=list.filter(s=>s.state==='closed'&&!String(s.id).startsWith('bl-')).length;
    html+='<div class="panel"><h2>👤 Desempenho por Dev/QA — '+esc(sprintLabel(a))+'</h2>'+
      '<p class="panel-sub">Devs: responsável (assignee) das issues da sprint atual, SP = campo <strong>Story Points</strong> (DEV + QA), sem subtarefas e sem canceladas. <strong>Linha 🧪 QA</strong>: pontos do campo <strong>Story point QA</strong> das histórias/tarefas/bugs. A responsabilidade (assignee) nunca passa para o QA — a issue é <strong>atribuída ao QA quando entra nos status de QA</strong>: <strong>não iniciado</strong> = PENDING QA · <strong>em andamento</strong> = ON TESTING (ON GOING QA), QA VERIFIED (APPROVED BY QA), QA DENIED (REJECTED BY QA) · <strong>entregue apenas quando DONE</strong>. Issues ainda em dev não contam para o QA. “Sem SP” (QA) = issues no fluxo de QA sem estimativa de QA.</p>'+
      '<table><thead><tr><th>Dev / QA</th><th>Issues atrib.</th><th>Issues concl.</th><th>SP atribuídos</th><th>SP entregues</th><th>SP em andamento</th><th>SP não iniciados</th><th>Sem SP</th><th>% SP entregue</th></tr></thead><tbody>'+rowsD+
      '<tr class="total-row"><td>TOTAL devs (Story Points)</td><td>'+totD.n+'</td><td>'+totD.dn+'</td><td>'+fmtSP(totD.sp)+'</td><td>'+fmtSP(totD.dsp)+'</td><td>'+fmtSP(totD.isp)+'</td><td>'+fmtSP(totD.tsp)+'</td><td>'+totD.noSP+'</td>'+
      '<td>'+(totD.sp>0?pct(totD.dsp,totD.sp)+'%':'—')+'</td></tr>'+
      qaRowHtml+
      '</tbody></table>'+
      (qaRowHtml?'<p style="font-size:11px;color:var(--text-disabled);margin:8px 0 0">A linha 🧪 QA não soma no TOTAL: os pontos de QA já estão contidos no campo Story Points das issues (Story Points = DEV + QA).</p>':'')+
      '</div>';
    // Matriz Dev/QA × Sprint: entregas (e alocação) por sprint + média final
    const realS=list.filter(s=>!String(s.id).startsWith('bl-'));
    const cellD=(v,s)=>{
      const b=(v.by||{})[s.id];
      if(!b||(!b.aN&&!b.dN)) return '<td style="color:var(--text-disabled)">—</td>';
      return '<td style="white-space:nowrap"><strong style="color:var(--verde)">'+fmtSP(b.dSP)+' SP</strong> · '+b.dN+' tsk'+
        '<br><small style="color:var(--text-secondary)">aloc. '+fmtSP(b.aSP)+' SP · '+b.aN+'</small></td>';
    };
    const avgCell=v=>'<td style="white-space:nowrap;background:rgba(78,203,113,.06)"><strong>'+fmtSP(Math.round(v.avgSP*100)/100)+' SP</strong> · '+(Math.round(v.avgN*10)/10)+' tarefas<br><small style="color:var(--text-secondary)">'+v.partN+' sprint(s) fechada(s)</small></td>';
    html+='<div class="panel"><h2>📊 Entregas por Dev/QA × Sprint</h2>'+
      '<p class="panel-sub">Por sprint: <strong style="color:var(--verde)">entregue</strong> (SP · tarefas, atribuído à sprint em que a issue foi concluída) e, abaixo, o alocado. Devs em SP totais (Story Points = DEV + QA); linha 🧪 QA em <strong>Story point QA</strong> — atribuída ao QA quando a issue entra nos status de QA, entregue só quando chega a DONE. <strong>Média final</strong> = entregue ÷ '+closedCnt+' sprints fechadas em que participou — recalcula ao vivo quando cada sprint encerra (a atual entra ao fechar).</p>'+
      '<table><thead><tr><th>Dev / QA</th>'+realS.map(s=>'<th>'+esc(sprintLabel(s))+(s.state==='active'?' ⬅️ atual':'')+'</th>').join('')+'<th>Média final /sprint</th></tr></thead><tbody>'+
      d.devs.map(v=>'<tr><td'+(v.name==='Sem responsável'?' style="color:var(--text-disabled);font-style:italic"':' style="font-weight:600"')+'>'+esc(v.name)+'</td>'+
        realS.map(s=>cellD(v,s)).join('')+avgCell(v)+'</tr>').join('')+
      ((q&&(q.n>0||q.histN>0))?('<tr class="qa-row"><td style="font-weight:600">🧪 '+esc(q.name)+' <span class="pill purple">Story point QA</span></td>'+realS.map(s=>cellD(q,s)).join('')+avgCell(q)+'</tr>'):'')+
      '</tbody></table></div>';
  }
  html+='<div class="panel"><h2>Velocity — Scope vs Delivered</h2><div class="chart-holder"><canvas id="map_vel"></canvas></div></div>';
  el.innerHTML=html;
  const ctx=document.getElementById('map_vel');
  charts.push(new Chart(ctx,{type:'bar',data:{labels:list.map(sprintLabel),datasets:[
    {label:'Scope SP',data:list.map(s=>scopeOf(s)),backgroundColor:'rgba(30,164,193,.35)',borderColor:'#1EA4C1',borderWidth:1},
    {label:'Delivered SP',data:list.map(s=>s.state==='active'?s.doneSP:s.delivered),backgroundColor:'rgba(78,203,113,.5)',borderColor:'#4ECB71',borderWidth:1}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#AAAAAA',font:{size:11}}}},
    scales:{x:{ticks:{color:'#666'},grid:{display:false}},y:{beginAtZero:true,ticks:{color:'#666'},grid:{color:'rgba(255,255,255,.05)'}}}}}));
}

/* ---------- boot ---------- */
function showView(v){
  localStorage.setItem('wh_view',v);
  document.querySelectorAll('#viewTabs button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.getElementById('viewPlan').classList.toggle('hidden',v!=='plan');
  document.getElementById('viewMap').classList.toggle('hidden',v!=='map');
  if(DATA){ if(v==='plan') renderPlan(); else {renderMapTabs();renderMap();} }
}
document.querySelectorAll('#viewTabs button').forEach(b=>b.onclick=()=>showView(b.dataset.view));

async function boot(){
  const loading=document.getElementById('loading'), eb=document.getElementById('errBox');
  eb.classList.add('hidden');
  loading.classList.remove('hidden');
  document.getElementById('btnRefresh').disabled=true;
  try{
    DATA=await loadAll();   // fetch data.json com cache-bust — sempre a última versão publicada
    loading.classList.add('hidden');
    const anyA=SQUADS.map(s=>DATA[s.code].active).find(Boolean);
    const gen=window.__GEN__?new Date(window.__GEN__).toLocaleString('pt-BR'):'—';
    const liveTxt=window.__LIVE__?'⚡ tempo real (consultado agora)':'último snapshot ('+gen+')';
    document.getElementById('subtitle').textContent=(anyA?sprintLabel(anyA)+' · Day '+anyA.day+' of '+WORKDAYS+' · ':'')+'Dados do Jira: '+liveTxt;
    document.getElementById('ctaStatus').innerHTML=window.__LIVE__
      ?'⚡ Consultado ao vivo agora às '+new Date(window.__GEN__).toLocaleTimeString('pt-BR')
      :(LIVE_ENDPOINT
        ?'⚠️ Proxy indisponível — mostrando o último snapshot de '+gen+' · <a href="'+ACTIONS_URL+'" target="_blank">ver execuções</a>'
        :'Mostrando o último snapshot publicado ('+gen+') · <a href="'+ACTIONS_URL+'" target="_blank">ver execuções</a>');
    document.getElementById('footer').innerHTML='<strong>Método (precisão):</strong> JQL <code>project = X AND sprint is not EMPTY AND issuetype NOT IN subtaskIssueTypes()</code> · SP = campo <strong>Story Points</strong> (customfield_10028), que <strong>já é a somatória DEV + QA</strong> da história/tarefa/bug (validado: Story Points = Story point total (dev, cf 10548) + Story point QA (cf 10546)), somados por status category, sem subtarefas nas 3 squads. <strong>Testamos usar o endpoint “oficial” de relatório de sprint do Jira como fonte única e revertemos</strong>: ele usa uma foto desatualizada dos pontos (mesma fonte do Burndown nativo) e chegou a mostrar a AE com 1,25 SP concluído quando o real era 64+ — por isso o cálculo ao vivo via JQL abaixo continua sendo a fonte da verdade (já bate com o widget “Progresso do sprint” do Jira). Linha 🧪 QA do Desempenho por Dev/QA: campo <strong>Story point QA</strong> — a issue é atribuída ao QA quando entra nos status de QA (PENDING QA = não iniciado; ON TESTING/ON GOING QA · QA VERIFIED/APPROVED BY QA · QA DENIED/REJECTED BY QA = em andamento); entregue só em DONE; issues em dev não contam para o QA. <strong>Issues em statuses CANCEL (categoria “done” no Jira) são excluídas do scope e nunca contam como entrega</strong>. Sprints <strong>fechadas</strong> usam baselines oficiais dos reports validados (badges lidos na época); valores sem baseline aparecem com “≈” (reconstruídos). Boards: AE 479 · OE 474 · EE 475. <strong>🔄 Atualizar dados</strong> consulta o Jira agora mesmo em tempo real (proxy serverless, sem exigir login de quem acessa); se o proxy não estiver configurado, mostra o último snapshot gerado pelo workflow Update data (fallback horário).';
    showView(localStorage.getItem('wh_view')||'plan');
  }catch(e){
    console.error('[weekly-hub] load error',e);
    loading.classList.add('hidden');
    eb.classList.remove('hidden');
    eb.textContent='Erro ao carregar dados: '+(e.message||e)+' — clique em 🔄 Atualizar dados para tentar novamente.';
  }finally{
    document.getElementById('btnRefresh').disabled=false;
  }
}
/* ---------- 🔄 Atualizar dados ----------
   Cada clique chama boot(), que tenta primeiro o proxy serverless (LIVE_ENDPOINT — Cloudflare
   Worker com o token do Jira guardado como Secret, nunca exposto ao navegador) para uma consulta
   em tempo real, e só se ele não responder cai para o último data.json publicado pelo GitHub
   Actions. Sem login, sem token, sem prompt para quem acessa o site. */
const ACTIONS_URL='https://github.com/Lousada-Shippify/shippify-weekly-squads-team/actions/workflows/update-data.yml';
document.getElementById('btnRefresh').onclick=()=>boot();
boot();
</script>
